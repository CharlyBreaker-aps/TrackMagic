<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1D9E75">
<title>MagicTracker v2.4 (By Charly)</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg:#0e0e0e;--bg2:#1a1a1a;--bg3:#252525;--bg4:#2e2e2e;
  --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
  --border:#2e2e2e;--border2:#3a3a3a;
  --green:#1D9E75;--green2:#16785a;--amber:#BA7517;--red:#c0392b;--blue:#2980b9;--purple:#534AB7;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:32px;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;padding:14px 16px 10px;gap:10px;border-bottom:0.5px solid var(--border)}
.topbar-title{font-size:17px;font-weight:700;flex:1}
.lang-toggle{display:flex;background:var(--bg3);border-radius:20px;padding:2px;gap:2px}
.lang-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:18px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--green);color:#fff}
.settings-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}

/* ── ONBOARDING ── */
.onboard{padding:20px 16px}
.ob-progress{display:flex;gap:4px;margin-bottom:24px}
.ob-dot{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background .3s}
.ob-dot.done{background:var(--green)}
.ob-dot.active{background:var(--green);opacity:.6}
.ob-title{font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.3}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.ob-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.ob-card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.ob-card.selected{border-color:var(--green);background:#0d2e1f}
.ob-card-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.ob-card-body{flex:1}
.ob-card-title{font-size:14px;font-weight:600;margin-bottom:3px}
.ob-card-desc{font-size:12px;color:var(--text2);line-height:1.4}
.ob-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.ob-card.selected .ob-check{border-color:var(--green);background:var(--green)}
.ob-card.selected .ob-check::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.ob-inputs{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.ob-input-group{display:flex;flex-direction:column;gap:5px}
.ob-label{font-size:12px;font-weight:600;color:var(--text2)}
.ob-input{padding:12px 14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;width:100%}
.ob-input:focus{outline:none;border-color:var(--green)}
.ob-input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob-unit{font-size:11px;color:var(--text3);margin-top:3px}
.ob-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.ob-btn:disabled{opacity:.4;cursor:not-allowed}
.ob-btn-secondary{background:transparent;border:1.5px solid var(--border2);color:var(--text2);margin-top:10px}
.ob-sex-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.ob-sex-card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s}
.ob-sex-card.selected{border-color:var(--green);background:#0d2e1f}
.ob-sex-icon{font-size:32px;margin-bottom:8px}
.ob-sex-label{font-size:14px;font-weight:600}
.ob-multi{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.ob-chip{padding:8px 14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text2)}
.ob-chip.selected{border-color:var(--green);background:#0d2e1f;color:var(--green)}

/* ── TRACKER MAIN ── */
.tracker{padding:0 0 20px}
.day-tabs{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px 6px}
.dtab{background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 11px;font-size:12px;cursor:pointer;color:var(--text2)}
.dtab.active{background:var(--bg2);color:var(--text);font-weight:600;border-color:#444}
.dtab.cf{border-left:3px solid var(--green)}.dtab.rs{border-left:3px solid var(--purple)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:6px 12px}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:9px 4px;text-align:center}
.sv{font-size:16px;font-weight:700}
.sl{font-size:9px;color:var(--text3);margin-top:2px}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--text)}
.def-box{margin:6px 12px;border-radius:var(--radius);padding:12px 14px;border:0.5px solid var(--border2)}
.def-box.ok{background:#0a2218;border-color:var(--green)}.def-box.low{background:#2e1c00;border-color:var(--amber)}
.def-box.excess{background:#2a0a0a;border-color:var(--red)}.def-box.over{background:#2a0a0a;border-color:var(--red)}
.dr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--text2)}
.dv{font-weight:600;color:var(--text)}
.dhr{border:none;border-top:0.5px solid var(--border);margin:6px 0}
.dm{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.dml{font-size:12px;color:var(--text2)}
.dmv{font-size:19px;font-weight:700}
.dbadge{margin-top:7px;padding:7px 12px;border-radius:var(--radius-sm);text-align:center;font-size:12px;font-weight:700;color:#fff}
.dbadge.ok{background:var(--green)}.dbadge.low{background:var(--amber)}.dbadge.excess,.dbadge.over{background:var(--red)}
.prog{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.pf{height:4px;border-radius:2px;transition:width .3s}
.pf.ok{background:var(--green)}.pf.low{background:var(--amber)}.pf.excess,.pf.over{background:var(--red)}
.dhint{font-size:10px;color:var(--text3);margin-top:4px}
.sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 12px 4px}
.supp-card,.rest-card{margin:0 12px 7px;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.srow{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow.done{background:#0a2218}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.done{border-color:var(--green);background:var(--green)}
.chk.done::after{content:'';width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.chkr{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chkr.done{border-color:var(--green);background:var(--green)}
.chkr.done::after{content:'';width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.sname{font-size:12px;flex:1}
.srow.done .sname{text-decoration:line-through;color:var(--green)}
.stag{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg3);color:var(--text3)}
.arow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);margin:0 12px 5px;cursor:pointer}
.arow.done{border-color:var(--green);background:#0a2218}
.aname{font-size:12px;font-weight:600;flex:1}
.arow.done .aname{color:var(--green)}
.akcal{font-size:11px;color:var(--text3)}
/* Restaurant cards */
.rest-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;background:var(--bg2)}
.ricon{font-size:15px;flex-shrink:0}
.rname{font-size:13px;font-weight:700;flex:1}
.rsrc{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg);border:0.5px solid var(--border2);color:var(--text3);white-space:nowrap}
.rok{font-size:10px;color:var(--green);font-weight:700}
.rarr{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rarr.open{transform:rotate(180deg)}
.rbody{display:none}.rbody.open{display:block}
.mopt{border-bottom:0.5px solid var(--border)}
.mopt:last-child{border-bottom:none}
.mhdr{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;cursor:pointer}
.mradio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.mradio.checked{border-color:var(--green);background:var(--green)}
.mradio.checked::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.minfo{flex:1;min-width:0}
.mname{font-size:12px;font-weight:600;line-height:1.3}
.mnote{font-size:10px;color:var(--blue);margin-top:2px}
.mmacs{font-size:10px;color:var(--text3);margin-top:2px}
.iwrap{padding:6px 12px;display:none}.iwrap.open{display:block}
.glbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:5px 0 3px}
.irow{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.irow:last-child{border-bottom:none}
.iinfo{flex:1;min-width:0}
.iname{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iname.done{text-decoration:line-through;color:var(--text3)}
.imac{font-size:10px;color:var(--text3)}
.imac.done{text-decoration:line-through}
.qb{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.qb.p{border-color:var(--green);color:var(--green)}
.qn{font-size:10px;font-weight:700;color:var(--green);min-width:13px;text-align:center;flex-shrink:0}
.mwrap{flex-shrink:0;display:flex;align-items:center;gap:2px}
.mb{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.ml{font-size:10px;min-width:28px;text-align:center;color:var(--text3);white-space:nowrap}
.ml.act{color:var(--amber);font-weight:700}
.exbox{border:0.5px dashed var(--border2);border-radius:var(--radius);overflow:hidden;margin-top:7px}
.exhdr{padding:8px 12px;background:var(--bg2);font-size:11px;font-weight:600;color:var(--text3)}
/* Search */
.search-card{margin:14px 12px 0;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.shdr{padding:11px 12px;background:var(--bg2);font-size:13px;font-weight:700}
.sbody{padding:10px 12px}
.tagrow{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.tbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid;cursor:pointer;background:transparent;font-weight:600}
.tbtn.tp{border-color:var(--green);color:var(--green)}
.tbtn.tl{border-color:var(--blue);color:var(--blue)}
.tbtn.th{border-color:#9B5000;color:#9B5000}
.sinp{width:100%;padding:10px 13px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg2);color:var(--text);margin-bottom:8px}
.sinp:focus{outline:none;border-color:var(--green)}
.sri{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.sri:last-child{border-bottom:none}
.sriname{font-size:12px;flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.sricat{font-size:9px;color:var(--text3)}
.srimac{font-size:10px;color:var(--text3);text-align:right;white-space:nowrap;line-height:1.4}
.sriadd{font-size:20px;color:var(--green);font-weight:300;flex-shrink:0}
.nores{font-size:12px;color:var(--text3);padding:8px 0;text-align:center}
.tp2{font-size:9px;padding:1px 5px;border-radius:4px;background:#0a2218;color:var(--green);flex-shrink:0}
.tl2{font-size:9px;padding:1px 5px;border-radius:4px;background:#0d1f3c;color:var(--blue);flex-shrink:0}
.th2{font-size:9px;padding:1px 5px;border-radius:4px;background:#3d2000;color:#FFBB77;flex-shrink:0}
.cbadge{font-size:9px;padding:1px 4px;border-radius:3px;background:#26215c;color:#cecbf6;flex-shrink:0}
.shint{font-size:10px;color:var(--text3);margin-top:4px}
.atunrow{display:flex;align-items:center;gap:6px;margin:10px 12px;padding:9px 12px;background:var(--bg2);border-radius:var(--radius-sm)}
.adot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0}
.adot.used{background:var(--purple);border-color:var(--purple)}
.rbtn{display:block;margin:12px 12px 0;padding:10px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text3);cursor:pointer;width:calc(100% - 24px);text-align:center}
.skey{font-size:11px;color:var(--text3);padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);margin:0 12px 8px;line-height:1.5}
/* Meal timing banner */
.timing-banner{margin:0 12px 8px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px}
.timing-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.timing-item{font-size:11px;color:var(--text3);padding:2px 0;display:flex;gap:6px}
.timing-time{color:var(--green);font-weight:600;min-width:60px}
/* Settings screen */
.settings-screen{padding:16px}
.settings-title{font-size:18px;font-weight:700;margin-bottom:16px}
.settings-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.settings-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:0.5px solid var(--border);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:13px;flex:1}
.settings-row-val{font-size:12px;color:var(--text3)}
.settings-row-arrow{font-size:12px;color:var(--text3)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0}
/* Profile summary card */
.profile-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin:0 12px 10px}
.profile-name{font-size:16px;font-weight:700;margin-bottom:6px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.pstat{text-align:center;background:var(--bg3);border-radius:var(--radius-sm);padding:7px 4px}
.pstat-v{font-size:14px;font-weight:700;color:var(--green)}
.pstat-l{font-size:9px;color:var(--text3);margin-top:1px}
/* Generic home meals */
.home-meal-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:#1a2a1a;color:#6fcf97;margin-left:3px}
</style>
</head>
<body>
<div id="root"></div>

<script>
// Global error handler — shows error + reset button instead of black screen
window.onerror = function(msg, src, line, col, err) {
  const root = document.getElementById('root');
  if (root && root.innerHTML.length < 100) {
    root.innerHTML = '<div style="padding:24px;font-family:sans-serif;background:#1a0000;min-height:100vh">'
      + '<div style="font-size:18px;color:#ff6b6b;margin-bottom:12px">⚠️ Something went wrong</div>'
      + '<div style="font-size:12px;color:#ff9999;font-family:monospace">' + msg + ' (line ' + line + ')</div>'
      + '<div style="margin-top:20px"><button onclick="localStorage.clear();location.reload()" '
      + 'style="padding:12px 24px;background:#c0392b;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer">'
      + '🔄 Reset &amp; reload</button></div>'
      + '<div style="margin-top:12px;font-size:11px;color:#666">This will clear your local data and restart the app.</div></div>';
  }
};

// MACRO CALCULATOR
// ══════════════════════════════════════════════
function calcMacros(profile) {
  const { sex, age, height, weight, goal, activity } = profile;
  // Mifflin-St Jeor
  const bmr = sex === 'male'
    ? Math.round(10*weight + 6.25*height - 5*age + 5)
    : Math.round(10*weight + 6.25*height - 5*age - 161);

  const actMult = { sedentary:1.2, light:1.375, moderate:1.55, very:1.725 };
  const tdee = Math.round(bmr * (actMult[activity] || 1.55));

  let target_kcal, prot_min, deficit_min, deficit_max, carb_max;
  const w = weight;

  if (goal === 'cut') {
    target_kcal = Math.max(1200, tdee - 500);
    prot_min = Math.round(w * 2.2);
    deficit_min = 400; deficit_max = 700;
    carb_max = 180;
  } else if (goal === 'recomp') {
    target_kcal = Math.max(1400, tdee - 200);
    prot_min = Math.round(w * 2.4);
    deficit_min = 150; deficit_max = 300;
    carb_max = 200;
  } else if (goal === 'maintain') {
    target_kcal = tdee;
    prot_min = Math.round(w * 1.8);
    deficit_min = -100; deficit_max = 100;
    carb_max = 250;
  } else { // bulk
    target_kcal = tdee + 300;
    prot_min = Math.round(w * 2.2);
    deficit_min = -500; deficit_max = -200;
    carb_max = 300;
  }

  return { bmr, tdee, target_kcal, prot_min, deficit_min, deficit_max, carb_max };
}

function loadProfileTracking(profileId) {

}

function ensureCharlyProfile() {
  if (!APP.profiles) APP.profiles = [];
  const idx = APP.profiles.findIndex(p => p.id==='charly');
  if (idx < 0) APP.profiles.unshift({...CHARLY_PROFILE});
  else APP.profiles[idx] = {...CHARLY_PROFILE};
}

function switchProfile(profileId) {
  const p = APP.profiles.find(x => x.id===profileId);
  if (!p) return;
  if (APP.activeProfileId) {
    if (!APP.allTrackingData) APP.allTrackingData = {};
    APP.allTrackingData[APP.activeProfileId] = {
      day:APP.day, rest:APP.rest, meal:APP.meal, chk:APP.chk, qty:APP.qty,
      mult:APP.mult, act:APP.act, sup:APP.sup, echk:APP.echk, eqty:APP.eqty,
      emult:APP.emult, cust:APP.cust, cchk:APP.cchk, cqty:APP.cqty, cmult:APP.cmult, atun:APP.atun,
      actBurn:APP.actBurn||{}, walkMins:APP.walkMins||{}
    };
  }
  APP.profile = p.isCharly ? {...CHARLY_PROFILE} : p;
  APP.activeProfileId = profileId;
  loadProfileTracking(profileId);
  APP.screen = 'tracker';
  save(); render();
}

// COMPUTED HELPERS
// ══════════════════════════════════════════════
function t(key) { return T[APP.lang][key] || T.en[key] || key; }
function getProfile() { return APP.profile || null; }

function isCFDay(d) {
  const p = getProfile();
  if (!p) return false;
  const idx = dayIndex(d);
  if (p.isCharly) return [0,2,4].includes(idx); // Mon, Wed, Fri
  return p.cf_days ? p.cf_days.includes(idx) : false;
}
function charlyDayIsCF(d) {
  return [0,2,4].includes(dayIndex(d)); // Mon=0, Wed=2, Fri=4
}
function dayIndex(d) {
  // Maps day ID → 0-based Mon-Sun index (Mon=0 ... Sun=6)
  const map = {
    'lun':0,'mar':1,'mie':2,'mié':2,'jue':3,'vie':4,'sab':5,'sáb':5,'dom':6,
    'mon':0,'tue':1,'wed':2,'thu':3,'fri':4,'sat':5,'sun':6
  };
  return map[d.toLowerCase()] ?? -1;
}
// JS getDay() → Mon-Sun 0-based index (Mon=0)
function jsDayToIdx(jsDay){ return jsDay===0?6:jsDay-1; }
function idxToJsDay(idx){ return idx===6?0:idx+1; }
function currentDayId() {
  const i = new Date().getDay(); // 0=Sun
  const days7 = ['dom','lun','mar','mié','jue','vie','sáb'];
  return days7[i];
}

function getDayList() {
  const p = getProfile();
  const lang = APP.lang;
  const dayIds = ['lun','mar','mie','jue','vie','sab','dom'];
  const labels = t('days'); // Mon-Sun or Lun-Dom
  return dayIds.map((id,i) => ({
    id, label: labels[i],
    cf: p && p.isCharly ? charlyDayIsCF(id) : (p && p.cf_days ? p.cf_days.includes(i) : false)
  }));
}

function getTDEE(d) {
  const p = getProfile();
  if (!p) return 2000;
  if (p.isCharly) {
    return charlyDayIsCF(d) ? CHARLY_PROFILE.tdee_cf : CHARLY_PROFILE.tdee_rest;
  }
  // Generic: use single TDEE
  const m = calcMacros(p);
  return m.tdee;
}
function getTargetKcal(d) {
  const p = getProfile();
  if (!p) return 1700;
  if (p.isCharly) return charlyDayIsCF(d) ? CHARLY_PROFILE.target_cf : CHARLY_PROFILE.target_rest;
  const m = calcMacros(p);
  return m.target_kcal;
}
function getProtMin() {
  const p = getProfile();
  if (!p) return 150;
  if (p.isCharly) return CHARLY_PROFILE.prot_min;
  return calcMacros(p).prot_min;
}
function getCarbMax(d) {
  const p = getProfile();
  if (!p) return 200;
  if (p.isCharly) return charlyDayIsCF(d) ? 200 : 150;
  return calcMacros(p).carb_max;
}
function getDeficitRange(d) {
  const p = getProfile();
  if (!p) return [350,700];
  if (p.isCharly) return charlyDayIsCF(d) ? [500,900] : [350,700];
  const m = calcMacros(p);
  return [m.deficit_min, m.deficit_max];
}

function getSupps() {

  ];
}
function getSnackA() { return CHARLY_SA(APP.lang); }
function getSnackB() { return CHARLY_SB(APP.lang); }
function getSnackItems(type) { return type === 'A' ? getSnackA() : getSnackB(); }
function getExtras(d) {
  const p = getProfile();
  const l = APP.lang;
  if (!p || !p.isCharly) return CHARLY_EX(l).slice(0,4);
  const m = getMeal(d);
  if (!m) return CHARLY_EX(l);
  const sn = getSnackItems(m.snack).map(x => x.name);
  return CHARLY_EX(l).filter(e => !sn.includes(e.name));
}
function getExtraSnacks() { return CHARLY_EXT(APP.lang); }

// ══════════════════════════════════════════════
// RESTAURANTS / MEALS
// ══════════════════════════════════════════════
function getRests(d) {
  const p = getProfile();
  if (!p) return [];
  if (p.isCharly) return buildCharlyRests(d);
  return buildGenericRests(p, APP.lang);
}
function getMeal(d) {
  const s = APP.meal[d];
  if (!s) return null;
  for (const r of getRests(d)) {
    const i = s[r.id];
    if (i !== undefined) return { ...r.meals[i], _rid: r.id, _midx: i };
  }
  return null;
}
function allItems(d) {
  const m = getMeal(d);
  if (!m) return [];
  const main = m.items.map((x,j) => ({...x, id:'m'+j}));
  const snk = m.snack ? getSnackItems(m.snack) : [];
  const at = getProfile()?.isCharly ? Array.from({length:m.atun||0}, (_,j) => ({...getATUN(APP.lang), id:'at'+j})) : [];
  return [...main, ...snk, ...at];
}
function exItems(d) { return getExtras(d); }

// ══════════════════════════════════════════════
// CALC
// ══════════════════════════════════════════════
function calc(d) {
  let k=0,p=0,cb=0;
  const ch=APP.chk[d]||{},q=APP.qty[d]||{},mu=APP.mult[d]||{};
  allItems(d).forEach(x=>{const m=mu[x.id]||1,tt=((ch[x.id]?1:0)+(q[x.id]||0))*m;k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;});
  const ec=APP.echk[d]||{},eq=APP.eqty[d]||{},em=APP.emult[d]||{};
  [...exItems(d),...getExtraSnacks()].forEach(x=>{const m=em[x.id]||1,tt=((ec[x.id]?1:0)+(eq[x.id]||0))*m;k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;});
  const cc=APP.cchk[d]||{},cq=APP.cqty[d]||{},cm=APP.cmult[d]||{};
  (APP.cust[d]||[]).forEach(x=>{const m=cm[x.id]||1,tt=((cc[x.id]?1:0)+(cq[x.id]||0))*m;k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;});
  const cf=isCFDay(d);
  const ac=APP.act[d]||{};let b=0;
  const pr=getProfile();
  let walkBurn=300, cfBurn=450;
  if(pr && !pr.isCharly){
    walkBurn=150;
    cfBurn=pr.exercise_burn||400;
  }
  // walkMins takes priority: duration * 4 kcal/min
  const walkMinsVal = (APP.walkMins&&APP.walkMins[d]) || (pr&&pr.isCharly?75:30);
  walkBurn = Math.round(walkMinsVal * 4);
  // Manual burn overrides (for workout row)
  const customBurns=(APP.actBurn&&APP.actBurn[d])||{};
  const wBurn=walkBurn; // walk always derives from minutes
  const cBurn=customBurns.cf||cfBurn;
  const acts=cf?[{id:'walk',burn:wBurn},{id:'cf',burn:cBurn}]:[{id:'walk',burn:wBurn}];
  acts.forEach(a=>{if(ac[a.id])b+=a.burn;});
  const tdee=getTDEE(d),def=tdee-Math.round(k);
  const [dm,dx]=getDeficitRange(d);
  let st;
  if(def<0)st='over';
  else if(def<dm)st='excess';
  else if(def<=dx)st='ok';
  else st='low';
  return{k:Math.round(k),p:Math.round(p),cb:Math.round(cb),b,tdee,def,st,dm,dx};
}

// STEP MULT
// ══════════════════════════════════════════════
function stepM(v,dir){const i=MSTEPS.indexOf(v);return MSTEPS[Math.max(0,Math.min(MSTEPS.length-1,i+dir))];}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
function srch(q){
  if(!q||q.length<2)return{list:[],type:'n'};
  const ql=q.toLowerCase().trim();
  const protKeys=['proteina','proteína','protein','high protein','alta proteina','alta proteína'];
  const lcKeys=['bajo cal','low cal','lowcal','bajo calorias','bajo calorías'];
  const hcKeys=['alta carbos','high carb','carbos altos','alto carbo'];
  const hmKeys=['home cooked','homemade','home meal','home meals','casero','comida casera','cocinado en casa','home cook'];
  if(protKeys.includes(ql))return{list:PROT.slice(0,15),type:'p'};
  if(lcKeys.includes(ql))return{list:LCAL.slice(0,15),type:'l'};
  if(hcKeys.includes(ql))return{list:HCARB.slice(0,15),type:'h'};
  if(hmKeys.includes(ql))return{list:HOMEMEALS.slice(0,20),type:'hm'};
  const ts=ql.split(/\s+/).filter(Boolean);
  return{list:FDB.filter(f=>ts.every(t2=>f.n.toLowerCase().includes(t2))).slice(0,10),type:'n'};
}

// ══════════════════════════════════════════════
function row(d,it,tp){
  const isE=tp==='e',isC=tp==='c';
  const ch=isE?(APP.echk[d]||{}):(isC?(APP.cchk[d]||{}):(APP.chk[d]||{}));
  const qs=isE?(APP.eqty[d]||{}):(isC?(APP.cqty[d]||{}):(APP.qty[d]||{}));
  const ms=isE?(APP.emult[d]||{}):(isC?(APP.cmult[d]||{}):(APP.mult[d]||{}));
  const dn=!!ch[it.id],eq=qs[it.id]||0,mult=ms[it.id]||1,dq=(dn?1:0)+eq,mA=mult!==1;
  const tf=isE?'tE':isC?'tC':'tI',inf=isE?'iE':isC?'iC':'iQ',df2=isE?'dE':isC?'dC':'dQ';
  const mpf=isE?'mEP':isC?'mCP':'mMP',mmf=isE?'mEM':isC?'mCM':'mMM';
  const dc=dn?'done':'';
  const tk=Math.round(it.kcal*dq*mult),tp2=Math.round(it.prot*dq*mult),tc=Math.round((it.carb||0)*dq*mult);
  const mac=dq>0?`${tk}kcal · ${tp2}g P · ${tc}g C`:`${it.kcal}kcal · ${it.prot}g P · ${it.carb||0}g C`;
  const bdg=isC?`<span class="cbadge">${t('searched')}</span>`:'';
  return`<div class="irow">
    <div class="chk ${dc}" onclick="${tf}('${d}','${it.id}')"></div>
    <button class="qb p" onclick="${inf}('${d}','${it.id}',event)">+</button>
    ${eq>0?`<span class="qn">+${eq}</span><button class="qb" onclick="${df2}('${d}','${it.id}',event)">−</button>`:''}
    <div class="iinfo">
      <span class="iname ${dc}">${it.name}${dq>1?' ×'+dq:''}${bdg}</span>
      <span class="imac ${dc}">${mac}</span>
    </div>
    <div class="mwrap">
      <button class="mb" onclick="${mmf}('${d}','${it.id}',event)">−</button>
      <span class="ml${mA?' act':''}">${MLBLS[mult]||mult+'×'}</span>
      <button class="mb" onclick="${mpf}('${d}','${it.id}',event)">+</button>
    </div>
  </div>`;
}

function obCanNext(step, od, tl) {
  if (step === 0) return !!od.lang;
  if (step === 1) return !!od.sex;
  if (step === 2) return od.age && od.weight && od.height;
  if (step === 3) return !!od.goal;
  if (step === 4) return !!od.activity;
  if (step === 5) return !!od.exercise_type && (od.exercise_days||[]).length > 0;
  if (step === 6) return !!od.eating;
  if (step === 7) return !!od.mealstyle;
  if (step === 8) return od.name && od.name.trim().length > 0;
  return true;
}

    <button class="back-btn" onclick="goTracker()">← ${tl.back.replace('← ','')}</button>
    <div class="settings-title">${tl.settings}</div>`;

  if (p) {
    html += `<div class="sec">${tl.my_profile}</div>
    <div class="profile-card">
      <div class="profile-name">${p.name || 'Profile'}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${p.height}cm · ${p.weight}kg · ${p.sex==='male'?(tl.ob_male||'Male'):(tl.ob_female||'Female')}</div>
      <div class="profile-stats">
        <div class="pstat"><div class="pstat-v">${bmrVal}</div><div class="pstat-l">BMR</div></div>
        <div class="pstat"><div class="pstat-v">${tdeeVal}</div><div class="pstat-l">TDEE</div></div>
        <div class="pstat"><div class="pstat-v">${targetVal}</div><div class="pstat-l">${tl.intake_target||'Target'}</div></div>
      </div>
    </div>

    <div class="settings-card">
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.goal}</span><span class="settings-row-val">${goalLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.activity_level}</span><span class="settings-row-val">${actLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.eating_pattern}</span><span class="settings-row-val">${eatLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.weight_kg}</span><span class="settings-row-val">${p.weight} kg</span></div>
    </div>

    <button class="ob-btn" onclick="startEdit()" style="margin-top:4px">
      ✏️ ${tl.edit_profile}
    </button>`;
  }

  // ── PROFILES LIST ──
  const allProfiles = APP.profiles || [];
  html += `<div class="sec" style="margin-top:16px">${APP.lang==='es'?'Todos los perfiles':'All profiles'}</div>
  <div class="settings-card">`;
  allProfiles.forEach(prof => {
    const isActive = prof.id === APP.activeProfileId;
    const isCharly = prof.isCharly;
    html += `<div class="settings-row" style="cursor:${isActive?'default':'pointer'}">
      <span style="font-size:16px;margin-right:6px">${isCharly?'⭐':'👤'}</span>
      <span style="flex:1;font-size:13px;${isActive?'color:var(--green);font-weight:700':''}">
        ${prof.name||'User'}${isActive?` ✓`:''}
      </span>
      ${!isActive?`<button onclick="switchProfile('${prof.id}')" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--green);color:var(--green);background:transparent;cursor:pointer;margin-right:6px">Switch</button>`:''}
      ${!isCharly?`<button onclick="deleteProfile('${prof.id}')" style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer">🗑</button>`:''}
    </div>`;
  });
  html += `<div class="settings-row" onclick="addNewProfile()" style="cursor:pointer;border-top:0.5px solid var(--border)">
    <span class="settings-row-label">➕ ${APP.lang==='es'?'Agregar nuevo perfil':'Add new profile'}</span>
    <span class="settings-row-arrow">›</span>
  </div>
  </div>`;

  html += `</div>`;
  return html;
}

function renderTracker() {
  const p = getProfile();
  if (!p) { goOnboard(); return ''; }
  const d = APP.day || (APP.day = currentDayId());
  const cf = isCFDay(d);
  const {k,p2,cb,b,tdee,def,st,dm,dx} = (() => { const r=calc(d); return {...r,p2:r.p}; })();
  const tK=getTargetKcal(d),tP=getProtMin(),tC=getCarbMax(d);
  const pct=Math.min(130,Math.round(k/tK*100));
  const pC=p2>=tP?'g':p2>=tP*.85?'a':'r';
  const kC=k>=tK*.9&&k<=tK*1.1?'g':k<tK*.9?'a':'r';
  const cC=cb<=tC?'b':cb<=tC*1.2?'a':'r';
  const STC={ok:{lbl:t('def_ok'),cls:'ok',bc:'ok',col:'var(--green)'},low:{lbl:t('def_low'),cls:'low',bc:'low',col:'var(--amber)'},excess:{lbl:t('def_excess'),cls:'excess',bc:'excess',col:'var(--red)'},over:{lbl:t('def_over'),cls:'over',bc:'over',col:'var(--red)'}};
  const cfg=STC[st];
  const sc=APP.sup[d]||{};
  const supps=getSupps();
  const sd=supps.filter(x=>sc[x.id]).length;
  const rests=getRests(d),selSt=APP.meal[d]||{},curM=getMeal(d);
  const dayList=getDayList();
  const timing=t('timing_'+p.eating) || t('timing_omad');

  let h = renderTopbar();
  h += `<div class="tracker">`;
  // Day tabs
  h+=`<div class="day-tabs">`;
  dayList.forEach(x=>{h+=`<button class="dtab ${x.cf?'cf':'rs'}${x.id===d?' active':''}" onclick="setDay('${x.id}')">${x.label}${x.cf?t('cf_label'):''}</button>`;});
  h+=`</div>`;

  // Stats
  h+=`<div class="stats">
    <div class="stat"><div class="sv ${kC}">${k}</div><div class="sl">${t('kcal_in')}</div></div>
    <div class="stat"><div class="sv ${pC}">${p2}g</div><div class="sl">${t('protein')}</div></div>
    <div class="stat"><div class="sv ${cC}">${cb}g</div><div class="sl">${t('carbs')}</div></div>
    <div class="stat"><div class="sv w">${b}</div><div class="sl">${t('activity')}</div></div>
  </div>`;

  // Deficit box
  h+=`<div class="def-box ${cfg.cls}">
    <div class="dr"><span>${t('bmr_neat')}</span><span class="dv">${p.bmr||calcMacros(p).bmr} kcal</span></div>
    <div class="dr"><span>${t('activity_label')}</span><span class="dv">${b} kcal</span></div>
    <div class="dr"><span>${t('total_tdee')}</span><span class="dv">${tdee} kcal</span></div>
    <div class="dhr"></div>
    <div class="dr"><span>${t('kcal_ingested')}</span><span class="dv">${k} kcal</span></div>
    <div class="dhr"></div>
    <div class="dm"><span class="dml">${t('estimated_deficit')}</span><span class="dmv" style="color:${cfg.col}">${def>=0?'−'+def:'+'+Math.abs(def)} kcal</span></div>
    <div class="dbadge ${cfg.cls}">${cfg.lbl}</div>
    <div class="prog"><div class="pf ${cfg.bc}" style="width:${Math.min(100,pct)}%"></div></div>
    <div class="dhint">${t('target_range')}: ${dm}–${dx} · ${t('intake_target')}: ${tK} kcal · ${t('carbs_target')}: ≤${tC}g</div>
  </div>`;

  // Meal timing
  if (timing && timing.length) {
    h+=`<div class="sec">${t('meal_timing')}</div>
    <div class="timing-banner">`;
    timing.forEach(ti=>{h+=`<div class="timing-item"><span class="timing-time">${ti.time}</span><span>${ti.label}</span></div>`;});
    h+=`</div>`;
  }

  // Supplements (Charly only)
  if (supps.length) {
    h+=`<div class="sec">${t('supplements')} — ${sd}/${supps.length} ${t('taken')}</div><div class="supp-card">`;
    supps.forEach(x=>{
      const dn=sc[x.id]?'done':'';
      const lbl=typeof x.label==='object'?x.label[APP.lang]:x.label;
      const tm=typeof x.time==='object'?x.time[APP.lang]:x.time;
      h+=`<div class="srow ${dn}" onclick="tS('${d}','${x.id}')"><div class="chk ${dn}"></div><span class="sname">${lbl}</span><span class="stag">${tm}</span></div>`;
    });
    h+=`</div>`;
  }

  // Activity — preload training days for non-Charly users if not yet set
  const ac=APP.act[d]||{};
  if(!p.isCharly && p.cf_days && ac._preloaded === undefined) {
    if (!APP.act[d]) APP.act[d]={};
    APP.act[d]._preloaded = true;
    if (isCFDay(d)) APP.act[d].cf = true;
    APP.act[d].walk = false; // walk starts unchecked, user decides
    save();
  }
  const acNow = APP.act[d]||{};

  // Build activity list based on profile
  let actDef;
  if(p.isCharly){
    actDef=cf
      ?[{id:'walk',name:APP.lang==='es'?'Caminata diaria (~75 min)':'Daily walk (~75 min)',burn:300},{id:'cf',name:APP.lang==='es'?'Sesión de crossfit (~60 min)':'Crossfit session (~60 min)',burn:450}]
      :[{id:'walk',name:APP.lang==='es'?'Caminata diaria (~75 min)':'Daily walk (~75 min)',burn:300}];
  } else {
    const exTypes=T[APP.lang].ob_exercise_types||[];
    const exType=exTypes.find(e=>e.id===p.exercise_type)||{title:'Workout',kcal:400};
    const dur=p.exercise_duration||60;
    const burn=p.exercise_burn||Math.round(exType.kcal*dur/60);
    const walkName=APP.lang==='es'?'Caminata (~30 min)':'Walk (~30 min)';
    const trainName=`${exType.title} (~${dur} min)`;
    actDef=cf
      ?[{id:'walk',name:walkName,burn:150},{id:'cf',name:trainName,burn}]
      :[{id:'walk',name:walkName,burn:150}];
  }

  h+=`<div class="sec">${t('physical_activity')}</div>`;
  if(actDef.length>0){
    h+=`<div style="display:flex;justify-content:flex-end;padding:0 12px 2px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${APP.lang==='es'?'kcal quemadas':'kcal burned'}</div>`;
  }
  actDef.forEach(a=>{
    const dn=acNow[a.id]?'done':'';
    const customBurn = APP.actBurn && APP.actBurn[d] && APP.actBurn[d][a.id];
    const showEdit = APP.actEditMode && APP.actEditMode[d+a.id];

    if(a.id==='walk') {
      // Walk: duration picker → auto-calculates kcal at ~4 kcal/min
      const walkMins = (APP.walkMins && APP.walkMins[d]) || (p.isCharly ? 75 : 30);
      const walkKcal = customBurn || Math.round(walkMins * 4);
      const showWalkEdit = showEdit;
      const walkDurations = [15,20,30,45,60,75,90];
      h+=`<div class="arow ${dn}" style="flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:120px" onclick="tA('${d}','walk')">
          <div class="chkr ${dn}"></div>
          <span class="aname">${APP.lang==='es'?'Caminata':'Walk'}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3)">${APP.lang==='es'?'min:':'min:'}</span>
          ${walkDurations.map(m=>`<button onclick="setWalkMins('${d}',${m})" style="padding:3px 7px;border-radius:12px;border:1.5px solid ${walkMins===m?'var(--green)':'var(--border2)'};background:${walkMins===m?'var(--green)':'transparent'};color:${walkMins===m?'#fff':'var(--text3)'};font-size:11px;font-weight:600;cursor:pointer">${m}</button>`).join('')}
          <span class="akcal" style="margin-left:4px">+${walkKcal} kcal</span>
        </div>
      </div>`;
    } else {
      // Workout: shows calculated kcal with manual override ✏️
      const displayBurn = customBurn || a.burn;
      const editBtn=`<button onclick="openEditBurn('${d}','${a.id}')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer">✏️</button>`;
      const editInput=`<input id="burn_${d}_${a.id}" type="number" inputmode="numeric" value="${displayBurn}" style="width:60px;padding:4px 6px;border-radius:6px;border:1px solid var(--green);background:var(--bg2);color:var(--text);font-size:12px;text-align:center" oninput="setCustomBurn('${d}','${a.id}',this.value)">
        <button onclick="closeEditBurn('${d}','${a.id}')" style="font-size:11px;padding:3px 8px;border-radius:5px;border:none;background:var(--green);color:#fff;cursor:pointer">✓</button>`;
      h+=`<div class="arow ${dn}" style="flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer" onclick="tA('${d}','${a.id}')">
          <div class="chkr ${dn}"></div>
          <span class="aname">${a.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${showEdit ? editInput : `<span class="akcal">+${displayBurn} kcal${customBurn?'*':''}</span>${editBtn}`}
        </div>
      </div>`;
    }
  });

  // Main meal
  h+=`<div class="sec">${t('main_meal')}</div>`;
  if (p.isCharly) {
    h+=`<div class="skey">${t('snack_a_key')}${t('snack_key_suffix')}</div>`;
  }
  rests.forEach(r=>{
    const selM=selSt[r.id],isOpen=APP.rest[d]&&APP.rest[d][r.id],hasSel=selM!==undefined;
    h+=`<div class="rest-card"><div class="rest-hdr" onclick="tRest('${d}','${r.id}')">
      <span class="ricon">${r.icon||'🍽️'}</span><span class="rname">${r.name}</span>
      <span class="rsrc">${r.src}</span>${hasSel?`<span class="rok">✓</span>`:''}
      <span class="rarr${isOpen?' open':''}">▼</span>
    </div><div class="rbody${isOpen?' open':''}">`;
    r.meals.forEach((m,mi)=>{
      const isSel=selM===mi;
      const tK2=m.items.reduce((s,x)=>s+x.kcal,0)+(m.snack?getSnackItems(m.snack).reduce((s,x)=>s+x.kcal,0):0);
      const tP2=m.items.reduce((s,x)=>s+x.prot,0)+(m.snack?getSnackItems(m.snack).reduce((s,x)=>s+x.prot,0):0);
      const tC2=m.items.reduce((s,x)=>s+(x.carb||0),0)+(m.snack?getSnackItems(m.snack).reduce((s,x)=>s+(x.carb||0),0):0);
      h+=`<div class="mopt"><div class="mhdr" onclick="selM('${d}','${r.id}',${mi})">
        <div class="mradio${isSel?' checked':''}"></div>
        <div class="minfo">
          <div class="mname">${m.name}</div>
          ${m.note?`<div class="mnote">ℹ ${m.note}</div>`:''}
          <div class="mmacs">${tK2}kcal · ${tP2}g P · ${tC2}g C${m.atun?` · ${m.atun}🥫`:''}</div>
        </div>
      </div>`;
      if(isSel&&curM&&curM._rid===r.id&&curM._midx===mi){
        h+=`<div class="iwrap open">`;
        // Column header
        h+=`<div style="display:flex;align-items:center;gap:4px;padding:4px 0 2px;border-bottom:0.5px solid var(--border)">
          <div style="width:18px;flex-shrink:0"></div>
          <div style="width:20px;flex-shrink:0"></div>
          <div style="flex:1;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${APP.lang==='es'?'Alimento':'Food item'}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;text-align:right;white-space:nowrap;margin-right:4px">${APP.lang==='es'?'Cant · Gramaje':'Qty · Serving'}</div>
        </div>`;
        h+=`<div class="glbl">${r.name} — ${r.src}</div>`;
        m.items.forEach((x,j)=>{h+=row(d,{...x,id:'m'+j},'m');});
        if (m.snack) {
          h+=`<div class="glbl">Snack ${m.snack}</div>`;
          getSnackItems(m.snack).forEach(x=>{h+=row(d,x,'m');});
        }
        if(p.isCharly&&(m.atun||0)>0){h+=`<div class="glbl">${APP.lang==='es'?'Atún':'Tuna'}</div>`;for(let j=0;j<m.atun;j++)h+=row(d,{...getATUN(APP.lang),id:'at'+j},'m');}
        h+=`<div class="exbox"><div class="exhdr">${t('extra_protein_snacks')}</div>`;
        getExtraSnacks().forEach(x=>{h+=row(d,x,'e');});
        h+=`</div><div class="exbox" style="margin-top:6px"><div class="exhdr">${t('optional_extras')}</div>`;
        exItems(d).forEach(x=>{h+=row(d,x,'e');});
        h+=`</div>`;
        const cl=APP.cust[d]||[];
        if(cl.length){h+=`<div class="glbl">${t('searched_foods')}</div>`;cl.forEach(x=>{h+=row(d,x,'c');});}
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });

  // Tuna tracker (Charly only)
  if (p.isCharly) {
    const au=APP.atun;
    h+=`<div class="atunrow"><span style="font-size:11px;color:var(--text3);flex:1">${t('weekly_tuna')}</span>`;
    for(let i=0;i<5;i++)h+=`<div class="adot${i<au?' used':''}" onclick="tAt(${i})"></div>`;
    h+=`<span style="font-size:11px;color:var(--text3);margin-left:4px">${au}/5</span></div>`;
  }
  h+=`<button class="rbtn" onclick="resetD('${d}')">${t('reset_day')}</button>`;
  h+=`</div>`;
  return h;
}

// ══════════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (!root) return;
  if (APP.screen === 'onboard') {
    root.innerHTML = renderOnboard();
  } else if (APP.screen === 'settings') {
    root.innerHTML = renderSettings();
  } else {
    root.innerHTML = renderTracker() + renderSearch();
    const si = document.getElementById('si');
    if (si) si.addEventListener('input', function(){updateSR();});
  }
}

// ══════════════════════════════════════════════
// SEARCH UPDATE
// ══════════════════════════════════════════════
function updateSR(){
  const el=document.getElementById('sr');if(!el)return;
  const q=document.getElementById('si')?.value||'';
  if(q.length<2){el.innerHTML='';return;}
  const {list,type}=srch(q);
  if(!list.length){el.innerHTML=`<div class="nores">${t('no_results')}</div>`;return;}
  const hmLabel=t('home_meals_tag')||'Home cooked meals';
  const hdr=type==='p'?`<div style="font-size:10px;color:var(--green);margin-bottom:5px;font-weight:700">🟢 ${t('high_protein')}</div>`
    :type==='l'?`<div style="font-size:10px;color:var(--blue);margin-bottom:5px;font-weight:700">🔵 ${t('low_cal')}</div>`
    :type==='h'?`<div style="font-size:10px;color:#9B5000;margin-bottom:5px;font-weight:700">🟠 ${t('high_carb')}</div>`
    :type==='hm'?`<div style="font-size:10px;color:#8B5CF6;margin-bottom:5px;font-weight:700">🏠 ${hmLabel} — ${list.length} meals</div>`
    :`<div style="font-size:10px;color:var(--text3);margin-bottom:5px">${list.length} ${list.length>1?t('results_pl'):t('results')} — ${t('add')}</div>`;
  el.innerHTML=hdr+list.map((f,i)=>{
    const tags=[
      f.hi?`<span class="tp2">${t('high_protein')}</span>`:'',
      f.lc?`<span class="tl2">${t('low_cal')}</span>`:'',
      f.hc?`<span class="th2">${t('high_carb')}</span>`:'',
      f.hm?`<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#2d1f4e;color:#a78bfa;flex-shrink:0">🏠 ${hmLabel}</span>`:'',
    ].filter(Boolean).join('');
    return`<div class="sri" onclick="addFood(${i},'${q.replace(/'/g,"\\'")}')">
      <div style="flex:1"><div class="sriname">${f.n}${tags}</div><div class="sricat">${f.cat}</div></div>
      <div class="srimac">${f.k}kcal<br>${f.p}g P · ${f.c}g C</div>
      <div class="sriadd">+</div>
    </div>`;
  }).join('');
}

function addFood(i,q){
  const {list}=srch(q);const f=list[i];if(!f)return;
  const d=APP.day;if(!d)return;
  if(!APP.cust[d])APP.cust[d]=[];
  APP.cust[d].push({id:'cx'+Date.now(),name:f.n,kcal:f.k,prot:f.p,carb:f.c||0});
  const si=document.getElementById('si');if(si)si.value='';
  document.getElementById('sr').innerHTML='';
  save();render();
}

function setSearch(v){const si=document.getElementById('si');if(si){si.value=v;si.focus();}updateSR();}

// ACTIONS

function setLang(l){APP.lang=l;APP.langSetByUser=true;save();render();}
function goSettings(){APP.screen='settings';APP.settings_edit_mode=false;render();}
function goTracker(){APP.screen='tracker';render();}
function goOnboard(){APP.screen='onboard';APP.ob_step=0;APP.ob_data={lang:APP.lang,sex:null,age:'',height:'',weight:'',waist:'',goal:null,activity:null,eating:null,mealstyle:null,diet:[],name:''};render();}
function resetProfile(){if(confirm('Reset profile? This will start the setup again.')){APP.profile=null;goOnboard();}}
function addNewProfile(){
  APP.screen='onboard';
  APP.ob_step=0;
  APP.ob_data={lang:APP.lang,sex:null,age:'',height:'',weight:'',waist:'',goal:null,activity:null,eating:null,mealstyle:null,diet:[],name:'',exercise_type:null,exercise_days:[],exercise_duration:'60'};
  save();render();
}
function deleteProfile(profileId){
  if(profileId==='charly')return; // never delete Charly
  const prof=APP.profiles.find(p=>p.id===profileId);
  const name=prof?prof.name:'this profile';
  const msg=APP.lang==='es'
    ?`¿Eliminar el perfil de ${name}? Esto no se puede deshacer.`
    :`Delete ${name}'s profile? This cannot be undone.`;
  if(!confirm(msg))return;
  APP.profiles=APP.profiles.filter(p=>p.id!==profileId);
  if(APP.allTrackingData)delete APP.allTrackingData[profileId];
  // If deleted profile was active, switch to Charly
  if(APP.activeProfileId===profileId){
    APP.activeProfileId='charly';
    const charlyProf=APP.profiles.find(p=>p.id==='charly');
    APP.profile={...CHARLY_PROFILE};
    loadProfileTracking('charly');
  }
  save();render();
}
// Edit profile in place
function startEdit(){
  APP.settings_edit_mode=true;
  APP.settings_edit_data={};
  render();
}
function cancelEdit(){APP.settings_edit_mode=false;APP.settings_edit_data={};render();}
function seSet(key,val){if(!APP.settings_edit_data)APP.settings_edit_data={};APP.settings_edit_data[key]=val;}
function saveEdit(){
  const ed=APP.settings_edit_data||{};
  const p=APP.profile;
  if(!p)return;
  // Apply edits
  if(ed.weight)p.weight=parseFloat(ed.weight);
  if(ed.waist)p.waist=parseFloat(ed.waist);
  if(ed.goal)p.goal=ed.goal;
  if(ed.activity)p.activity=ed.activity;
  if(ed.eating)p.eating=ed.eating;
  // Recalculate macros if not Charly
  if(!p.isCharly){
    const m=calcMacros(p);
    p.bmr=m.bmr;p.tdee=m.tdee;p.target_kcal=m.target_kcal;
    p.prot_min=m.prot_min;p.deficit_min=m.deficit_min;p.deficit_max=m.deficit_max;p.carb_max=m.carb_max;
  } else {
    // For Charly, update the live profile object only (Charly's TDEE stays hardcoded)
    // goal/activity changes affect display only
  }
  APP.settings_edit_mode=false;APP.settings_edit_data={};
  save();render();
}

// Onboarding actions
function obSetLang(l){APP.ob_data.lang=l;APP.lang=l;render();}
function obSet(key,val){APP.ob_data[key]=val;save();render();}
function obSetInput(key,val){
  APP.ob_data[key]=val;save();
  clearTimeout(window._obInputTimer);
  window._obInputTimer=setTimeout(()=>{
    const btn=document.querySelector('.ob-btn:not(.ob-btn-secondary)');
    if(btn){const od=APP.ob_data;const tl=T[od.lang||APP.lang];btn.disabled=!obCanNext(APP.ob_step,od,tl);}
  },100);
}
function obToggleDay(i){
  if(!APP.ob_data.exercise_days)APP.ob_data.exercise_days=[];
  const d=APP.ob_data.exercise_days;
  const idx=d.indexOf(i);
  if(idx>=0)d.splice(idx,1);else d.push(i);
  save();render();
}
function obToggleDiet(id){
  const d=APP.ob_data.diet;
  if(id==='none'){APP.ob_data.diet=['none'];render();return;}
  const idx=d.indexOf(id);
  if(idx>=0)d.splice(idx,1);else{d.push(id);const ni=d.indexOf('none');if(ni>=0)d.splice(ni,1);}
  render();
}
function obNext(){APP.ob_step++;save();render();}
function obBack(){if(APP.ob_step>0){APP.ob_step--;save();render();}}
function obFinish(){
  const od=APP.ob_data;
  const m=calcMacros({sex:od.sex,age:parseInt(od.age),height:parseInt(od.height),weight:parseFloat(od.weight),goal:od.goal,activity:od.activity});
  // Calculate exercise burn per session
  const tl=T[od.lang||'en'];
  const exType=tl.ob_exercise_types.find(e=>e.id===od.exercise_type)||{kcal:400};
  const dur=parseInt(od.exercise_duration||'60');
  const burnPerSession=Math.round(exType.kcal * dur/60);
  const newProfile={
    id:'user_'+Date.now(),
    name:od.name,
    sex:od.sex,age:parseInt(od.age),height:parseInt(od.height),weight:parseFloat(od.weight),waist:parseInt(od.waist)||0,
    goal:od.goal,activity:od.activity,eating:od.eating,mealstyle:od.mealstyle,diet:od.diet,
    exercise_type:od.exercise_type,exercise_days:od.exercise_days||[],exercise_duration:dur,
    exercise_burn:burnPerSession,
    bmr:m.bmr,tdee:m.tdee,target_kcal:m.target_kcal,prot_min:m.prot_min,
    deficit_min:m.deficit_min,deficit_max:m.deficit_max,carb_max:m.carb_max,
    cf_days:od.exercise_days||[1,3,5],
    isCharly:false,
  };
  if (!APP.profiles) APP.profiles = [];
  APP.profiles.push(newProfile);
  APP.lang=od.lang||'en';
  APP.langSetByUser=true;
  APP.profile=newProfile;
  APP.activeProfileId=newProfile.id;
  loadProfileTracking(newProfile.id);
  APP.screen='tracker';
  save();render();
}

// Tracker actions
function setDay(d){APP.day=d;save();render();}
function tRest(d,rid){if(!APP.rest[d])APP.rest[d]={};APP.rest[d][rid]=!APP.rest[d][rid];save();render();}
function selM(d,rid,mi){
  if(!APP.meal[d])APP.meal[d]={};
  if(APP.meal[d][rid]===mi){delete APP.meal[d][rid];['chk','qty','mult','echk','eqty','emult'].forEach(k=>{APP[k][d]={};});save();render();return;}
  APP.meal[d]={[rid]:mi};['chk','qty','mult','echk','eqty','emult'].forEach(k=>{APP[k][d]={};});
  if(!APP.rest[d])APP.rest[d]={};APP.rest[d][rid]=true;save();render();
}
function tI(d,id){if(!APP.chk[d])APP.chk[d]={};const w=!!APP.chk[d][id];APP.chk[d][id]=!w;if(id.startsWith('at'))APP.atun=Math.max(0,APP.atun+(w?-1:1));save();render();}
function iQ(d,id,e){e.stopPropagation();if(!APP.qty[d])APP.qty[d]={};APP.qty[d][id]=(APP.qty[d][id]||0)+1;if(id.startsWith('at'))APP.atun=Math.min(5,APP.atun+1);save();render();}
function dQ(d,id,e){e.stopPropagation();if(!APP.qty[d])APP.qty[d]={};const c=APP.qty[d][id]||0;if(c>0){APP.qty[d][id]=c-1;if(id.startsWith('at'))APP.atun=Math.max(0,APP.atun-1);}save();render();}
function _setMult(store,d,id,dir){if(!APP[store][d])APP[store][d]={};APP[store][d][id]=stepM(APP[store][d][id]||1,dir);save();render();}
function mMP(d,id,e){e.stopPropagation();_setMult('mult',d,id,1);}function mMM(d,id,e){e.stopPropagation();_setMult('mult',d,id,-1);}
function mEP(d,id,e){e.stopPropagation();_setMult('emult',d,id,1);}function mEM(d,id,e){e.stopPropagation();_setMult('emult',d,id,-1);}
function mCP(d,id,e){e.stopPropagation();_setMult('cmult',d,id,1);}function mCM(d,id,e){e.stopPropagation();_setMult('cmult',d,id,-1);}
function tE(d,id){if(!APP.echk[d])APP.echk[d]={};APP.echk[d][id]=!APP.echk[d][id];save();render();}
function iE(d,id,e){e.stopPropagation();if(!APP.eqty[d])APP.eqty[d]={};APP.eqty[d][id]=(APP.eqty[d][id]||0)+1;save();render();}
function dE(d,id,e){e.stopPropagation();if(!APP.eqty[d])APP.eqty[d]={};const c=APP.eqty[d][id]||0;if(c>0)APP.eqty[d][id]=c-1;save();render();}
function tC(d,id){if(!APP.cchk[d])APP.cchk[d]={};APP.cchk[d][id]=!APP.cchk[d][id];save();render();}
function iC(d,id,e){e.stopPropagation();if(!APP.cqty[d])APP.cqty[d]={};APP.cqty[d][id]=(APP.cqty[d][id]||0)+1;save();render();}
function dC(d,id,e){e.stopPropagation();if(!APP.cqty[d])APP.cqty[d]={};const c=APP.cqty[d][id]||0;if(c>0)APP.cqty[d][id]=c-1;save();render();}
function tA(d,id){if(!APP.act[d])APP.act[d]={};APP.act[d][id]=!APP.act[d][id];save();render();}
function setWalkMins(d,mins){
  if(!APP.walkMins)APP.walkMins={};
  APP.walkMins[d]=mins;
  // Auto-calc kcal at 4 kcal/min and store as custom burn
  if(!APP.actBurn)APP.actBurn={};
  if(!APP.actBurn[d])APP.actBurn[d]={};
  APP.actBurn[d].walk=Math.round(mins*4);
  save();render();
}
function openEditBurn(d,id){if(!APP.actEditMode)APP.actEditMode={};APP.actEditMode[d+id]=true;render();setTimeout(()=>{const el=document.getElementById('burn_'+d+'_'+id);if(el){el.focus();el.select();}},50);}
function closeEditBurn(d,id){if(APP.actEditMode)delete APP.actEditMode[d+id];save();render();}
function setCustomBurn(d,id,val){if(!APP.actBurn)APP.actBurn={};if(!APP.actBurn[d])APP.actBurn[d]={};APP.actBurn[d][id]=parseInt(val)||0;}
function tS(d,id){if(!APP.sup[d])APP.sup[d]={};APP.sup[d][id]=!APP.sup[d][id];save();render();}
function tAt(i){APP.atun=i<APP.atun?i:i+1;save();render();}
function resetD(d){
  ['chk','qty','mult','act','sup','echk','eqty','emult','cchk','cqty','cmult'].forEach(k=>{APP[k][d]={};});
  APP.cust[d]=[];APP.meal[d]={};APP.rest[d]={};save();render();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  load();
  if (!APP.langSetByUser) APP.lang = 'en';
  if (!APP.allTrackingData) APP.allTrackingData = {};

  // Always ensure Charly is in the profiles list
  ensureCharlyProfile();

  // FIRST TIME: no activeProfileId and no prior data → show onboarding
  const hadPriorData = localStorage.getItem('tracker_s');
  if (!APP.activeProfileId && !hadPriorData) {
    // Brand new device — show onboarding
    APP.screen = 'onboard';
    APP.ob_step = 0;
    APP.ob_data = { lang:'en', sex:null, age:'', height:'', weight:'', waist:'', goal:null, activity:null, eating:null, mealstyle:null, diet:[], name:'', exercise_type:null, exercise_days:[], exercise_duration:'60' };
    render();
    return;
  }

  // Migrate old data: had prior data but no activeProfileId → default to Charly
  if (!APP.activeProfileId) {
    APP.activeProfileId = 'charly';
  }

  // Ensure activeProfileId exists in profiles list
  if (!APP.profiles.find(p => p.id === APP.activeProfileId)) {
    APP.activeProfileId = 'charly';
  }

  // Load active profile
  const prof = APP.profiles.find(p => p.id === APP.activeProfileId);
  APP.profile = prof.isCharly ? {...CHARLY_PROFILE} : prof;
  loadProfileTracking(APP.activeProfileId);
  APP.screen = 'tracker';
  save();
  render();

  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
}

init();
</script>

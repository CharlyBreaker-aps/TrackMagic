:root{
  --bg:#ffffff; --bg2:#f5f5f5; --bg3:#ebebeb;
  --text:#111111; --text2:#555555; --text3:#888888;
  --border:#dddddd; --border2:#cccccc;
  --green:#1D9E75; --amber:#BA7517; --red:#A32D2D; --blue:#185FA5;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0e0e0e; --bg2:#1a1a1a; --bg3:#252525;
    --text:#f0f0f0; --text2:#aaaaaa; --text3:#777777;
    --border:#333333; --border2:#444444;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;max-width:480px;margin:0 auto;padding-bottom:24px}
h1{font-size:16px;font-weight:600;padding:14px 16px 10px;border-bottom:0.5px solid var(--border)}
.tabs{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px 6px}
.tab{background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--text2)}
.tab.active{background:var(--bg2);color:var(--text);font-weight:600;border-color:var(--border2)}
.tab.cf{border-left:3px solid var(--green)}.tab.rs{border-left:3px solid #7F77DD}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:6px 12px}
.stat{background:var(--bg2);border-radius:10px;padding:8px 4px;text-align:center}
.stat-v{font-size:16px;font-weight:600}
.stat-l{font-size:9px;color:var(--text3);margin-top:2px}
.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}.blue{color:var(--blue)}.muted{color:var(--text)}
.def-box{margin:6px 12px;border-radius:10px;padding:10px 12px;border:0.5px solid var(--border)}
.def-box.ok{background:#e6f7f1;border-color:var(--green)}.def-box.low{background:#fdf3e0;border-color:var(--amber)}
.def-box.excess{background:#fdecea;border-color:var(--red)}.def-box.over{background:#fdecea;border-color:var(--red)}
@media(prefers-color-scheme:dark){
  .def-box.ok{background:#062e1f}.def-box.low{background:#2e1c00}.def-box.excess,.def-box.over{background:#2e0a0a}
}
.def-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--text2)}
.def-val{font-weight:600;color:var(--text)}
.def-hr{border:none;border-top:0.5px solid var(--border);margin:5px 0}
.def-main{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.def-main-lbl{font-size:12px;color:var(--text2)}
.def-main-val{font-size:18px;font-weight:700}
.def-badge{margin-top:6px;padding:6px 10px;border-radius:8px;text-align:center;font-size:12px;font-weight:600;color:#fff}
.badge-ok{background:var(--green)}.badge-low{background:var(--amber)}.badge-excess,.badge-over{background:var(--red)}
.prog{height:4px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:4px;border-radius:2px;transition:width .3s}
.fill-ok{background:var(--green)}.fill-low{background:var(--amber)}.fill-excess,.fill-over{background:var(--red)}
.def-hint{font-size:10px;color:var(--text3);margin-top:4px}
.sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:10px 12px 4px}
.supp-card{margin:0 12px 6px;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.supp-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--border)}
.supp-row:last-child{border-bottom:none}
.supp-row.done{background:#e6f7f1}
@media(prefers-color-scheme:dark){.supp-row.done{background:#062e1f}}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.done{border-color:var(--green);background:var(--green)}
.chk.done::after{content:'';width:10px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.chk-round{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk-round.done{border-color:var(--green);background:var(--green)}
.chk-round.done::after{content:'';width:10px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.supp-name{font-size:12px;flex:1}
.supp-row.done .supp-name{text-decoration:line-through;color:var(--green)}
.badge-time{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg2);color:var(--text3)}
.act-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid var(--border);border-radius:10px;margin:0 12px 5px;cursor:pointer}
.act-row.done{border-color:var(--green);background:#e6f7f1}
@media(prefers-color-scheme:dark){.act-row.done{background:#062e1f}}
.act-name{font-size:12px;font-weight:600;flex:1}
.act-row.done .act-name{color:var(--green)}
.act-kcal{font-size:11px;color:var(--text3)}
.rest-card{margin:0 12px 7px;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.rest-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:var(--bg2)}
.rest-icon{font-size:15px;flex-shrink:0}
.rest-name{font-size:13px;font-weight:700;flex:1}
.rest-src{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg);border:0.5px solid var(--border);color:var(--text3);white-space:nowrap}
.rest-ok{font-size:10px;color:var(--green);font-weight:700;white-space:nowrap}
.rest-arr{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rest-arr.open{transform:rotate(180deg)}
.rest-body{display:none}.rest-body.open{display:block}
.meal-opt{border-bottom:0.5px solid var(--border)}
.meal-opt:last-child{border-bottom:none}
.meal-hdr{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;cursor:pointer}
.meal-radio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.meal-radio.checked{border-color:var(--green);background:var(--green)}
.meal-radio.checked::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.meal-info{flex:1;min-width:0}
.meal-name{font-size:12px;font-weight:600;line-height:1.3}
.meal-note{font-size:10px;color:var(--blue);margin-top:2px}
.meal-macros{font-size:10px;color:var(--text3);white-space:nowrap;text-align:right;margin-top:2px}
.items-wrap{padding:6px 12px;display:none}.items-wrap.open{display:block}
.grp-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:5px 0 3px}
.item-row{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-name{font-size:11px;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-name.done{text-decoration:line-through;color:var(--text3)}
.item-mac{font-size:10px;color:var(--text3)}
.item-mac.done{text-decoration:line-through}
.qbtn{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.qbtn.plus{border-color:var(--green);color:var(--green)}
.qnum{font-size:10px;font-weight:700;color:var(--green);min-width:13px;text-align:center;flex-shrink:0}
.mult-wrap{flex-shrink:0;display:flex;align-items:center;gap:3px}
.mbtn{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}

.extras-hdr{padding:7px 12px;background:var(--bg2);font-size:11px;font-weight:600;color:var(--text3)}
.search-card{margin:14px 12px 0;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.search-hdr{padding:10px 12px;background:var(--bg2);font-size:12px;font-weight:700}
.search-body{padding:10px 12px}
.tag-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}

.tag-lc{border-color:var(--blue);color:var(--blue)}
.tag-hc{border-color:#9B5000;color:#9B5000}
.srch-inp{width:100%;padding:9px 12px;border:0.5px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);margin-bottom:8px}

.sri{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.sri:last-child{border-bottom:none}

.tag-p{font-size:9px;padding:1px 5px;border-radius:4px;background:#e6f7f1;color:var(--green);flex-shrink:0}
.tag-lct{font-size:9px;padding:1px 5px;border-radius:4px;background:#eef3fe;color:var(--blue);flex-shrink:0}
.tag-hct{font-size:9px;padding:1px 5px;border-radius:4px;background:#fef3e2;color:#9B5000;flex-shrink:0}
.cbadge{font-size:9px;padding:1px 4px;border-radius:3px;background:#eeedfe;color:#534AB7;flex-shrink:0}
.srch-hint{font-size:10px;color:var(--text3);margin-top:4px}
.atun-row{display:flex;align-items:center;gap:6px;margin:10px 12px;padding:8px 12px;background:var(--bg2);border-radius:10px}
.atun-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0}
.atun-dot.used{background:#534AB7;border-color:#534AB7}
.reset-btn{display:block;margin:12px 12px 0;padding:9px;font-size:12px;border:0.5px solid var(--border2);border-radius:8px;background:transparent;color:var(--text3);cursor:pointer;width:calc(100% - 24px);text-align:center}
.snack-key{font-size:11px;color:var(--text3);padding:7px 12px;background:var(--bg2);border-radius:8px;margin:0 12px 8px;line-height:1.5}
@media(prefers-color-scheme:dark){
  .tag-p{background:#062e1f}.tag-lct{background:#0d1f3c}.tag-hct{background:#3d2000}.cbadge{background:#26215c;color:#cecbf6}
}
</style>
</head>

function getMeal(d){const s=S.meal[d];if(!s)return null;for(const r of buildR(d)){const i=s[r.id];if(i!==undefined)return{...r.meals[i],_rid:r.id,_midx:i};}return null;}
function allIt(d){const m=getMeal(d);if(!m)return[];return[...m.items.map((x,j)=>({...x,id:'m'+j})),...snkI(m.snack),...Array.from({length:m.atun||0},(_,j)=>({...ATUN,id:'at'+j}))]; }
function exIt(d){const m=getMeal(d);if(!m)return EXT;const sn=snkI(m.snack).map(x=>x.name);return EXT.filter(e=>!sn.includes(e.name));}
function stepM(v,dir){const i=MSTEPS.indexOf(v);return MSTEPS[Math.max(0,Math.min(MSTEPS.length-1,i+dir))];}

function calc(d){
  let k=0,p=0,cb=0;
  const ch=S.chk[d]||{},q=S.qty[d]||{},mu=S.mult[d]||{};
  allIt(d).forEach(x=>{const m=mu[x.id]||1,t=((ch[x.id]?1:0)+(q[x.id]||0))*m;k+=x.kcal*t;p+=x.prot*t;cb+=(x.carb||0)*t;});

  [...exIt(d),...SEX].forEach(x=>{const m=em[x.id]||1,t=((ec[x.id]?1:0)+(eq[x.id]||0))*m;k+=x.kcal*t;p+=x.prot*t;cb+=(x.carb||0)*t;});
  const cc=S.cchk[d]||{},cq=S.cqty[d]||{},cm=S.cmult[d]||{};
  (S.cust[d]||[]).forEach(x=>{const m=cm[x.id]||1,t=((cc[x.id]?1:0)+(cq[x.id]||0))*m;k+=x.kcal*t;p+=x.prot*t;cb+=(x.carb||0)*t;});
  const isCF=DAYS.find(x=>x.id===d)?.cf;
  const ac=S.act[d]||{};let b=0;
  (isCF?ACTS.cf:ACTS.rest).forEach(a=>{if(ac[a.id])b+=a.burn;});
  const tdee=isCF?TDEE_CF:TDEE_REST,def=tdee-Math.round(k),dm=isCF?500:350,dx=isCF?900:700;

  else if(def<=dx)st='ok';

  low:{lbl:'Déficit muy alto — comiste poco',cls:'low',bc:'fill-low',col:'var(--amber)'},
  excess:{lbl:'Déficit bajo — estás comiendo de más',cls:'excess',bc:'fill-over',col:'var(--red)'},
  over:{lbl:'Superávit — te pasaste del TDEE',cls:'over',bc:'fill-over',col:'var(--red)'},
};

function row(d,it,tp){
  const isE=tp==='e',isC=tp==='c';
  const ch=isE?(S.echk[d]||{}):(isC?(S.cchk[d]||{}):(S.chk[d]||{}));
  const qs=isE?(S.eqty[d]||{}):(isC?(S.cqty[d]||{}):(S.qty[d]||{}));
  const ms=isE?(S.emult[d]||{}):(isC?(S.cmult[d]||{}):(S.mult[d]||{}));
  const dn=!!ch[it.id],eq=qs[it.id]||0,mult=ms[it.id]||1,dq=(dn?1:0)+eq,mA=mult!==1;
  const tf=isE?'tE':isC?'tC':'tI',inf=isE?'iE':isC?'iC':'iQ',df2=isE?'dE':isC?'dC':'dQ';
  const mpf=isE?'mEP':isC?'mCP':'mMP',mmf=isE?'mEM':isC?'mCM':'mMM';
  const dc=dn?'done':'';
  const tk=Math.round(it.kcal*dq*mult),tp2=Math.round(it.prot*dq*mult),tc=Math.round((it.carb||0)*dq*mult);
  const mac=dq>0?`${tk}kcal · ${tp2}g P · ${tc}g C`:`${it.kcal}kcal · ${it.prot}g P · ${it.carb||0}g C`;
  const bdg=isC?`<span class="cbadge">buscado</span>`:'';
  return`<div class="item-row">
    <div class="chk ${dc}" onclick="${tf}('${d}','${it.id}')"></div>
    <button class="qbtn plus" onclick="${inf}('${d}','${it.id}',event)">+</button>
    ${eq>0?`<span class="qnum">+${eq}</span><button class="qbtn" onclick="${df2}('${d}','${it.id}',event)">−</button>`:''}
    <div class="item-info">
      <span class="item-name ${dc}">${it.name}${dq>1?' ×'+dq:''}${bdg}</span>
      <span class="item-mac ${dc}">${mac}</span>
    </div>
    <div class="mult-wrap">
      <button class="mbtn" onclick="${mmf}('${d}','${it.id}',event)">−</button>
      <span class="mlbl${mA?' active':''}">${MLBLS[mult]||mult+'×'}</span>
      <button class="mbtn" onclick="${mpf}('${d}','${it.id}',event)">+</button>
    </div>
  </div>`;
}

function srch(q){
  if(!q||q.length<2)return{list:[],type:'n'};
  const ql=q.toLowerCase().trim();
  if(['proteina','proteína','protein'].includes(ql))return{list:PROT.slice(0,15),type:'p'};
  if(['bajo cal','low cal','lowcal'].includes(ql))return{list:LCAL.slice(0,15),type:'l'};
  if(['alta carbos','high carb','carbos altos'].includes(ql))return{list:HCARB.slice(0,15),type:'h'};
  const ts=ql.split(/\s+/).filter(Boolean);
  return{list:FDB.filter(f=>ts.every(t=>f.n.toLowerCase().includes(t))).slice(0,10),type:'n'};
}
function setSearch(v){const si=document.getElementById('si');if(si){si.value=v;si.focus();}updateSR();}
function updateSR(){
  const el=document.getElementById('sr');if(!el)return;
  const q=document.getElementById('si')?.value||'';
  if(q.length<2){el.innerHTML='';return;}
  const {list,type}=srch(q);
  if(!list.length){el.innerHTML=`<div class="no-res">Sin resultados.</div>`;return;}
  const hdr=type==='p'?`<div style="font-size:10px;color:var(--green);margin-bottom:5px;font-weight:700">🟢 Alta proteína</div>`
    :type==='l'?`<div style="font-size:10px;color:var(--blue);margin-bottom:5px;font-weight:700">🔵 Bajo cal</div>`
    :type==='h'?`<div style="font-size:10px;color:#9B5000;margin-bottom:5px;font-weight:700">🟠 Alta carbos</div>`
    :`<div style="font-size:10px;color:var(--text3);margin-bottom:5px">${list.length} resultado${list.length>1?'s':''}</div>`;
  el.innerHTML=hdr+list.map((f,i)=>{
    const tags=[f.hi?`<span class="tag-p">proteína</span>`:'',f.lc?`<span class="tag-lct">bajo cal</span>`:'',f.hc?`<span class="tag-hct">alta carbos</span>`:''].filter(Boolean).join('');
    return`<div class="sri" onclick="addFood(${i},'${q.replace(/'/g,"\\'")}')">
      <div style="flex:1"><div class="sri-name">${f.n}${tags}</div><div class="sri-cat">${f.cat}</div></div>
      <div class="sri-mac">${f.k}kcal<br>${f.p}g P · ${f.c}g C</div>
      <div class="sri-add">+</div>
    </div>`;
  }).join('');
}
function addFood(i,q){
  const {list}=srch(q);const f=list[i];if(!f)return;
  const d=S.day;if(!S.cust[d])S.cust[d]=[];
  S.cust[d].push({id:'cx'+Date.now(),name:f.n,kcal:f.k,prot:f.p,carb:f.c||0});
  const si=document.getElementById('si');if(si)si.value='';
  document.getElementById('sr').innerHTML='';
  save();render();
}

function render(){
  const d=S.day||(S.day=DAYS[dayIdx()].id);
  const isCF=DAYS.find(x=>x.id===d)?.cf;
  const {k,p,cb,b,tdee,def,st,dm,dx}=calc(d);
  const cfg=STC[st];
  const tK=isCF?1900:1700,tP=150,tC=isCF?200:150;
  const pct=Math.min(130,Math.round(k/tK*100));
  const pC=p>=tP?'green':p>=tP*.85?'amber':'red';
  const kC=k>=tK*.9&&k<=tK*1.1?'green':k<tK*.9?'amber':'red';
  const cC=cb<=tC?'blue':cb<=tC*1.2?'amber':'red';
  const sc=S.sup[d]||{},sd=SUPPS.filter(x=>sc[x.id]).length;
  const rests=buildR(d),selSt=S.meal[d]||{},curM=getMeal(d);
  let h='';
  // Day tabs
  h+=`<div class="tabs">`;DAYS.forEach(x=>{h+=`<button class="tab ${x.cf?'cf':'rs'}${x.id===d?' active':''}" onclick="setDay('${x.id}')">${x.label}${x.cf?' ⚡':''}</button>`;});h+=`</div>`;
  // Stats
  h+=`<div class="stats">
    <div class="stat"><div class="stat-v ${kC}">${k}</div><div class="stat-l">kcal</div></div>
    <div class="stat"><div class="stat-v ${pC}">${p}g</div><div class="stat-l">proteína</div></div>
    <div class="stat"><div class="stat-v ${cC}">${cb}g</div><div class="stat-l">carbos</div></div>
    <div class="stat"><div class="stat-v muted">${b}</div><div class="stat-l">kcal act.</div></div>
  </div>`;
  // Deficit box
  h+=`<div class="def-box ${cfg.cls}">
    <div class="def-row"><span>BMR + NEAT</span><span class="def-val">${BMR+NEAT} kcal</span></div>
    <div class="def-row"><span>Actividad (${isCF?'CF + caminata':'caminata'})</span><span class="def-val">${b} kcal</span></div>
    <div class="def-row"><span>TDEE estimado</span><span class="def-val">${tdee} kcal</span></div>
    <div class="def-hr"></div>
    <div class="def-row"><span>Calorías ingeridas</span><span class="def-val">${k} kcal</span></div>
    <div class="def-hr"></div>
    <div class="def-main">
      <span class="def-main-lbl">Déficit estimado</span>
      <span class="def-main-val" style="color:${cfg.col}">${def>=0?'−'+def:'+'+Math.abs(def)} kcal</span>
    </div>
    <div class="def-badge badge-${cfg.cls}">${cfg.lbl}</div>
    <div class="prog"><div class="prog-fill ${cfg.bc}" style="width:${Math.min(100,pct)}%"></div></div>
    <div class="def-hint">Rango: ${dm}–${dx} kcal déficit · ingesta: ${tK} kcal · carbos: ≤${tC}g</div>
  </div>`;
  // Supplements
  h+=`<div class="sec">Suplementos — ${sd}/${SUPPS.length}</div><div class="supp-card">`;
  SUPPS.forEach(x=>{const dn=sc[x.id]?'done':'';h+=`<div class="supp-row ${dn}" onclick="tS('${d}','${x.id}')"><div class="chk ${dn}"></div><span class="supp-name">${x.label}</span><span class="badge-time">${x.time}</span></div>`;});
  h+=`</div>`;
  // Activity
  const ac=S.act[d]||{};h+=`<div class="sec">Actividad física</div>`;
  (isCF?ACTS.cf:ACTS.rest).forEach(a=>{const dn=ac[a.id]?'done':'';h+=`<div class="act-row ${dn}" onclick="tA('${d}','${a.id}')"><div class="chk-round ${dn}"></div><span class="act-name">${a.name}</span><span class="act-kcal">+${a.burn} kcal</span></div>`;});
  // Meals
  h+=`<div class="sec">Plato principal</div>`;
  h+=`<div class="snack-key">Snack A = cottage+huevos+pan · Snack B = +biltong · + cantidad · −/+ gramaje</div>`;
  rests.forEach(r=>{
    const selM=selSt[r.id],isOpen=S.rest[d]&&S.rest[d][r.id],hasSel=selM!==undefined;
    h+=`<div class="rest-card"><div class="rest-hdr" onclick="tRest('${d}','${r.id}')">
      <span class="rest-icon">${r.icon}</span><span class="rest-name">${r.name}</span>
      <span class="rest-src">${r.src}</span>${hasSel?`<span class="rest-ok">✓</span>`:''}
      <span class="rest-arr${isOpen?' open':''}">▼</span>
    </div><div class="rest-body${isOpen?' open':''}">`;
    r.meals.forEach((m,mi)=>{
      const isSel=selM===mi;
      const tK2=m.items.reduce((s,x)=>s+x.kcal,0)+snkI(m.snack).reduce((s,x)=>s+x.kcal,0);
      const tP2=m.items.reduce((s,x)=>s+x.prot,0)+snkI(m.snack).reduce((s,x)=>s+x.prot,0);
      const tC2=m.items.reduce((s,x)=>s+(x.carb||0),0)+snkI(m.snack).reduce((s,x)=>s+(x.carb||0),0);
      h+=`<div class="meal-opt"><div class="meal-hdr" onclick="selM('${d}','${r.id}',${mi})">
        <div class="meal-radio${isSel?' checked':''}"></div>
        <div class="meal-info">
          <div class="meal-name">${m.name}</div>
          ${m.note?`<div class="meal-note">ℹ ${m.note}</div>`:''}
          <div class="meal-macros">${tK2}kcal · ${tP2}g P · ${tC2}g C${m.atun?` · ${m.atun}🥫`:''}</div>
        </div>
      </div>`;
      if(isSel&&curM&&curM._rid===r.id&&curM._midx===mi){
        h+=`<div class="items-wrap open">`;
        h+=`<div class="grp-lbl">Plato principal — ${r.src}</div>`;
        m.items.forEach((x,j)=>{h+=row(d,{...x,id:'m'+j},'m');});
        h+=`<div class="grp-lbl">Snack ${m.snack}</div>`;
        snkI(m.snack).forEach(x=>{h+=row(d,x,'m');});
        if((m.atun||0)>0){h+=`<div class="grp-lbl">Atún</div>`;for(let j=0;j<m.atun;j++)h+=row(d,{...ATUN,id:'at'+j},'m');}
        h+=`<div class="extras-box"><div class="extras-hdr">Snacks extra de alta proteína</div>`;
        SEX.forEach(x=>{h+=row(d,x,'e');});
        h+=`</div><div class="extras-box" style="margin-top:6px"><div class="extras-hdr">Extras opcionales</div>`;
        exIt(d).forEach(x=>{h+=row(d,x,'e');});
        h+=`</div>`;
        const cl=S.cust[d]||[];if(cl.length){h+=`<div class="grp-lbl">Alimentos buscados</div>`;cl.forEach(x=>{h+=row(d,x,'c');});}
        h+=`</div>`;
      }
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  // Atun
  const au=S.atun;
  h+=`<div class="atun-row"><span style="font-size:11px;color:var(--text3);flex:1">Atún semana (máx 5):</span>`;
  for(let i=0;i<5;i++)h+=`<div class="atun-dot${i<au?' used':''}" onclick="tAt(${i})"></div>`;
  h+=`<span style="font-size:11px;color:var(--text3);margin-left:4px">${au}/5</span></div>`;
  h+=`<button class="reset-btn" onclick="resetD('${d}')">Reiniciar día</button>`;
  document.getElementById('app').innerHTML=h;
}

function setDay(d){S.day=d;save();render();}
function tRest(d,rid){if(!S.rest[d])S.rest[d]={};S.rest[d][rid]=!S.rest[d][rid];save();render();}
function selM(d,rid,mi){
  if(!S.meal[d])S.meal[d]={};
  if(S.meal[d][rid]===mi){delete S.meal[d][rid];['chk','qty','mult','echk','eqty','emult'].forEach(k=>{S[k][d]={};});save();render();return;}
  S.meal[d]={[rid]:mi};['chk','qty','mult','echk','eqty','emult'].forEach(k=>{S[k][d]={};});
  if(!S.rest[d])S.rest[d]={};S.rest[d][rid]=true;save();render();
}
function tI(d,id){if(!S.chk[d])S.chk[d]={};const w=!!S.chk[d][id];S.chk[d][id]=!w;if(id.startsWith('at'))S.atun=Math.max(0,S.atun+(w?-1:1));save();render();}
function iQ(d,id,e){e.stopPropagation();if(!S.qty[d])S.qty[d]={};S.qty[d][id]=(S.qty[d][id]||0)+1;if(id.startsWith('at'))S.atun=Math.min(5,S.atun+1);save();render();}
function dQ(d,id,e){e.stopPropagation();if(!S.qty[d])S.qty[d]={};const c=S.qty[d][id]||0;if(c>0){S.qty[d][id]=c-1;if(id.startsWith('at'))S.atun=Math.max(0,S.atun-1);}save();render();}
function _setMult(store,d,id,dir){if(!store[d])store[d]={};store[d][id]=stepM(store[d][id]||1,dir);save();render();}
function mMP(d,id,e){e.stopPropagation();_setMult(S.mult,d,id,1);}function mMM(d,id,e){e.stopPropagation();_setMult(S.mult,d,id,-1);}
function mEP(d,id,e){e.stopPropagation();_setMult(S.emult,d,id,1);}function mEM(d,id,e){e.stopPropagation();_setMult(S.emult,d,id,-1);}
function mCP(d,id,e){e.stopPropagation();_setMult(S.cmult,d,id,1);}function mCM(d,id,e){e.stopPropagation();_setMult(S.cmult,d,id,-1);}
function tE(d,id){if(!S.echk[d])S.echk[d]={};S.echk[d][id]=!S.echk[d][id];save();render();}
function iE(d,id,e){e.stopPropagation();if(!S.eqty[d])S.eqty[d]={};S.eqty[d][id]=(S.eqty[d][id]||0)+1;save();render();}
function dE(d,id,e){e.stopPropagation();if(!S.eqty[d])S.eqty[d]={};const c=S.eqty[d][id]||0;if(c>0)S.eqty[d][id]=c-1;save();render();}
function tC(d,id){if(!S.cchk[d])S.cchk[d]={};S.cchk[d][id]=!S.cchk[d][id];save();render();}
function iC(d,id,e){e.stopPropagation();if(!S.cqty[d])S.cqty[d]={};S.cqty[d][id]=(S.cqty[d][id]||0)+1;save();render();}
function dC(d,id,e){e.stopPropagation();if(!S.cqty[d])S.cqty[d]={};const c=S.cqty[d][id]||0;if(c>0)S.cqty[d][id]=c-1;save();render();}
function tA(d,id){if(!S.act[d])S.act[d]={};S.act[d][id]=!S.act[d][id];save();render();}
function tS(d,id){if(!S.sup[d])S.sup[d]={};S.sup[d][id]=!S.sup[d][id];save();render();}
function tAt(i){S.atun=i<S.atun?i:i+1;save();render();}
function resetD(d){['chk','qty','mult','act','sup','echk','eqty','emult','cchk','cqty','cmult'].forEach(k=>{S[k][d]={};});S.cust[d]=[];S.meal[d]={};S.rest[d]={};save();render();}

document.getElementById('si').addEventListener('input',function(){updateSR();});

// Register service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered')).catch(e=>console.log('SW error',e));
  });
}

load();
render();
</script>
</body>
</html>

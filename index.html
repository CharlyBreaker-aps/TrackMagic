<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>MagicTracker v6.5 (By Charly)</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

<style>
:root{
  --bg:#0e0e0e;--bg2:#1a1a1a;--bg3:#252525;--bg4:#2e2e2e;
  --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
  --border:#2e2e2e;--border2:#3a3a3a;
  --green:#1D9E75;--green2:#16785a;--amber:#BA7517;--red:#c0392b;--blue:#2980b9;--purple:#534AB7;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:32px;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;padding:14px 16px 10px;gap:10px;border-bottom:0.5px solid var(--border)}
.topbar-title{font-size:17px;font-weight:700;flex:1}
.lang-toggle{display:flex;background:var(--bg3);border-radius:20px;padding:2px;gap:2px}
.lang-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:18px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--green);color:#fff}
.settings-btn{width:34px;height:34px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}

/* ── ONBOARDING ── */
.onboard{padding:20px 16px}
.ob-progress{display:flex;gap:4px;margin-bottom:24px}
.ob-dot{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background .3s}
.ob-dot.done{background:var(--green)}
.ob-dot.active{background:var(--green);opacity:.6}
.ob-title{font-size:22px;font-weight:700;margin-bottom:6px;line-height:1.3}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}
.ob-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.ob-card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
.ob-card.selected{border-color:var(--green);background:#0d2e1f}
.ob-card-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.ob-card-body{flex:1}
.ob-card-title{font-size:14px;font-weight:600;margin-bottom:3px}
.ob-card-desc{font-size:12px;color:var(--text2);line-height:1.4}
.ob-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.ob-card.selected .ob-check{border-color:var(--green);background:var(--green)}
.ob-card.selected .ob-check::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.ob-inputs{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.ob-input-group{display:flex;flex-direction:column;gap:5px}
.ob-label{font-size:12px;font-weight:600;color:var(--text2)}
.ob-input{padding:12px 14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:15px;width:100%}
.ob-input:focus{outline:none;border-color:var(--green)}
.ob-input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob-unit{font-size:11px;color:var(--text3);margin-top:3px}
.ob-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.3px}
.ob-btn:disabled{opacity:.4;cursor:not-allowed}
.ob-btn-secondary{background:transparent;border:1.5px solid var(--border2);color:var(--text2);margin-top:10px}
.ob-sex-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.ob-sex-card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--radius);padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s}
.ob-sex-card.selected{border-color:var(--green);background:#0d2e1f}
.ob-sex-icon{font-size:32px;margin-bottom:8px}
.ob-sex-label{font-size:14px;font-weight:600}
.ob-multi{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.ob-chip{padding:8px 14px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text2)}
.ob-chip.selected{border-color:var(--green);background:#0d2e1f;color:var(--green)}

/* ── TRACKER MAIN ── */
.tracker{padding:0 0 20px}
.day-tabs{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px 6px}
.dtab{background:transparent;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 11px;font-size:12px;cursor:pointer;color:var(--text2)}
.dtab.active{background:var(--bg2);color:var(--text);font-weight:600;border-color:#444}
.dtab.cf{border-left:3px solid var(--green)}.dtab.rs{border-left:3px solid var(--purple)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px 12px}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:9px 4px;text-align:center}
.sv{font-size:16px;font-weight:700}
.sl{font-size:9px;color:var(--text3);margin-top:2px}
.g{color:var(--green)}.a{color:var(--amber)}.r{color:var(--red)}.b{color:var(--blue)}.w{color:var(--text)}
.def-box{margin:6px 12px;border-radius:var(--radius);padding:12px 14px;border:0.5px solid var(--border2)}
.def-box.ok{background:#0a2218;border-color:var(--green)}.def-box.low{background:#2e1c00;border-color:var(--amber)}
.def-box.excess{background:#2a0a0a;border-color:var(--red)}.def-box.over{background:#2a0a0a;border-color:var(--red)}
.def-box.pending{background:var(--bg2);border-color:var(--border2)}
.dr{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:var(--text2)}
.dv{font-weight:600;color:var(--text)}
.dhr{border:none;border-top:0.5px solid var(--border);margin:6px 0}
.dm{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.dml{font-size:12px;color:var(--text2)}
.dmv{font-size:19px;font-weight:700}
.dbadge{margin-top:7px;padding:7px 12px;border-radius:var(--radius-sm);text-align:center;font-size:12px;font-weight:700;color:#fff}
.dbadge.ok{background:var(--green)}.dbadge.low{background:var(--amber)}.dbadge.excess,.dbadge.over{background:var(--red)}
.dbadge.pending{background:var(--bg3);color:var(--text2)}
.prog{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.pf{height:4px;border-radius:2px;transition:width .3s}
.pf.ok{background:var(--green)}.pf.low{background:var(--amber)}.pf.excess,.pf.over{background:var(--red)}
.dhint{font-size:10px;color:var(--text3);margin-top:4px}
.sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 12px 4px}
.supp-card,.rest-card{margin:0 12px 7px;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.srow{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.srow.done{background:#0a2218}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.done{border-color:var(--green);background:var(--green)}
.chk.done::after{content:'';width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.chkr{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chkr.done{border-color:var(--green);background:var(--green)}
.chkr.done::after{content:'';width:9px;height:6px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.sname{font-size:12px;flex:1}
.srow.done .sname{text-decoration:line-through;color:var(--green)}
.stag{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg3);color:var(--text3)}
.arow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius);margin:0 12px 5px;cursor:pointer}
.arow.done{border-color:var(--green);background:#0a2218}
.aname{font-size:12px;font-weight:600;flex:1}
.arow.done .aname{color:var(--green)}
.akcal{font-size:11px;color:var(--text3)}
/* Restaurant cards */
.rest-hdr{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;background:var(--bg2)}
.ricon{font-size:15px;flex-shrink:0}
.rname{font-size:13px;font-weight:700;flex:1}
.rsrc{font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg);border:0.5px solid var(--border2);color:var(--text3);white-space:nowrap}
.rok{font-size:10px;color:var(--green);font-weight:700}
.rarr{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.rarr.open{transform:rotate(180deg)}
.rbody{display:none}.rbody.open{display:block}
.mopt{border-bottom:0.5px solid var(--border)}
.mopt:last-child{border-bottom:none}
.mhdr{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;cursor:pointer}
.mradio{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.mradio.checked{border-color:var(--green);background:var(--green)}
.mradio.checked::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.minfo{flex:1;min-width:0}
.mname{font-size:12px;font-weight:600;line-height:1.3}
.mnote{font-size:10px;color:var(--blue);margin-top:2px}
.mmacs{font-size:10px;color:var(--text3);margin-top:2px}
.iwrap{padding:6px 12px;display:none}.iwrap.open{display:block}
.glbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:5px 0 3px}
.irow{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:0.5px solid var(--border)}
.irow:last-child{border-bottom:none}
.iinfo{flex:1;min-width:0}
.iname{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iname.done{text-decoration:line-through;color:var(--text3)}
.imac{font-size:10px;color:var(--text3)}
.imac.done{text-decoration:line-through}
.qb{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.qb.p{border-color:var(--green);color:var(--green)}
.qn{font-size:10px;font-weight:700;color:var(--green);min-width:13px;text-align:center;flex-shrink:0}
.mwrap{flex-shrink:0;display:flex;align-items:center;gap:2px}
.mb{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.ml{font-size:10px;min-width:28px;text-align:center;color:var(--text3);white-space:nowrap}
.ml.act{color:var(--amber);font-weight:700}
.exbox{border:0.5px dashed var(--border2);border-radius:var(--radius);overflow:hidden;margin-top:7px}
.exhdr{padding:8px 12px;background:var(--bg2);font-size:11px;font-weight:600;color:var(--text3)}
/* Search */
.search-card{margin:14px 12px 0;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden}
.shdr{padding:11px 12px;background:var(--bg2);font-size:13px;font-weight:700}
.sbody{padding:10px 12px}
.tagrow{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.tbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid;cursor:pointer;background:transparent;font-weight:600}
.tbtn.tp{border-color:var(--green);color:var(--green)}
.tbtn.tl{border-color:var(--blue);color:var(--blue)}
.tbtn.th{border-color:#9B5000;color:#9B5000}
.sinp{width:100%;padding:10px 13px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg2);color:var(--text);margin-bottom:8px}
.sinp:focus{outline:none;border-color:var(--green)}
.sri{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.sri:last-child{border-bottom:none}
.sriname{font-size:12px;flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.sricat{font-size:9px;color:var(--text3)}
.srimac{font-size:10px;color:var(--text3);text-align:right;white-space:nowrap;line-height:1.4}
.sriadd{font-size:20px;color:var(--green);font-weight:300;flex-shrink:0}
.nores{font-size:12px;color:var(--text3);padding:8px 0;text-align:center}
.tp2{font-size:9px;padding:1px 5px;border-radius:4px;background:#0a2218;color:var(--green);flex-shrink:0}
.tl2{font-size:9px;padding:1px 5px;border-radius:4px;background:#0d1f3c;color:var(--blue);flex-shrink:0}
.th2{font-size:9px;padding:1px 5px;border-radius:4px;background:#3d2000;color:#FFBB77;flex-shrink:0}
.cbadge{font-size:9px;padding:1px 4px;border-radius:3px;background:#26215c;color:#cecbf6;flex-shrink:0}
.shint{font-size:10px;color:var(--text3);margin-top:4px}
.atunrow{display:flex;align-items:center;gap:6px;margin:10px 12px;padding:9px 12px;background:var(--bg2);border-radius:var(--radius-sm)}
.adot{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0}
.adot.used{background:var(--purple);border-color:var(--purple)}
.rbtn{display:block;margin:12px 12px 0;padding:10px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text3);cursor:pointer;width:calc(100% - 24px);text-align:center}
.skey{font-size:11px;color:var(--text3);padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);margin:0 12px 8px;line-height:1.5}
/* Meal timing banner */
.timing-banner{margin:0 12px 8px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px}
.timing-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.timing-item{font-size:11px;color:var(--text3);padding:2px 0;display:flex;gap:6px}
.timing-time{color:var(--green);font-weight:600;min-width:60px}
/* Settings screen */
.settings-screen{padding:16px}
.settings-title{font-size:18px;font-weight:700;margin-bottom:16px}
.settings-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.settings-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:0.5px solid var(--border);cursor:pointer}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:13px;flex:1}
.settings-row-val{font-size:12px;color:var(--text3)}
.settings-row-arrow{font-size:12px;color:var(--text3)}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--green);cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0}
/* Profile summary card */
.profile-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;margin:0 12px 10px}
.profile-name{font-size:16px;font-weight:700;margin-bottom:6px}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.pstat{text-align:center;background:var(--bg3);border-radius:var(--radius-sm);padding:7px 4px}
.pstat-v{font-size:14px;font-weight:700;color:var(--green)}
.pstat-l{font-size:9px;color:var(--text3);margin-top:1px}
/* Generic home meals */
.home-meal-tag{font-size:9px;padding:1px 5px;border-radius:4px;background:#1a2a1a;color:#6fcf97;margin-left:3px}
</style>
</head>

<script>
// Global error handler — shows error + reset button instead of black screen
window.onerror = function(msg, src, line, col, err) {
  const root = document.getElementById('root');
  if (root && root.innerHTML.length < 100) {
    root.innerHTML = '<div style="padding:24px;font-family:sans-serif;background:#1a0000;min-height:100vh">'
      + '<div style="font-size:18px;color:#ff6b6b;margin-bottom:12px">⚠️ Something went wrong</div>'
      + '<div style="font-size:12px;color:#ff9999;font-family:monospace">' + msg + ' (line ' + line + ')</div>'
      + '<div style="margin-top:20px"><button onclick="if(confirm(\'Clear all data?\')){localStorage.clear();location.reload()}" '
      + 'style="padding:12px 24px;background:#c0392b;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer">'
      + '🔄 Reset &amp; reload</button></div>'
      + '<div style="margin-top:12px;font-size:11px;color:#666">This will clear your local data and restart the app.</div></div>';
  }
};

// Global accessor for Wembley Park restaurants — usable by buildGenericRests
function getWembleyRests(subset) {
  // Temporarily invoke buildCharlyRests with a dummy day to get restaurant objects
  // We extract N, I, WA, etc. by calling the function and reading its closure
  // Simpler: just re-define them inline here using same data
  const all = buildCharlyRests('lun'); // returns array of restaurant objects for Monday
  const allRests = ['lun','mar','mie','jue','vie','sab','dom']
    .flatMap(d => buildCharlyRests(d))
    .filter((r,i,arr) => arr.findIndex(x=>x.id===r.id)===i); // deduplicate
  if (!subset) return allRests;
  return allRests.filter(r => subset.includes(r.id));
}

// MACRO CALCULATOR
// ══════════════════════════════════════════════
function calcMacros(profile) {
  const { sex, age, height, weight, goal, activity, exercise_days, exercise_burn, exercise_duration } = profile;

  // Mifflin-St Jeor BMR
  const bmr = sex === 'male'
    ? Math.round(10*weight + 6.25*height - 5*age + 5)
    : Math.round(10*weight + 6.25*height - 5*age - 161);

  // NEAT = non-exercise activity thermogenesis
  // Calibrated so that 'very' active profile with same stats as Charly gives identical targets
  const neatMap = { sedentary:150, light:180, moderate:220, very:250 };
  const neat = (profile.neat) || neatMap[activity] || 220;

  // Base = BMR + NEAT
  const base = bmr + neat;

  // Typical daily walk burn (used for target calculation, not the dynamic tracker)
  // Users who walk daily: sedentary=0, light=120, moderate=200, very=300
  const typicalWalkMap = { sedentary:0, light:120, moderate:200, very:300 };
  const typicalWalk = typicalWalkMap[activity] || 200;

  // Weekly exercise calories
  const daysPerWeek = (exercise_days||[]).length || 3;
  const burnPerSession = exercise_burn || 400;
  const weeklyExBurn = daysPerWeek * burnPerSession;
  const dailyExBurn = Math.round(weeklyExBurn / 7);

  // TDEE = base + typical walk + average exercise (for settings display)
  const tdee = Math.round(base + typicalWalk + dailyExBurn);

  // Rest day TDEE = base + typical walk
  const tdee_rest = base + typicalWalk;
  // Training day TDEE = base + typical walk + full session
  const tdee_active = base + typicalWalk + burnPerSession;

  let target_kcal, target_active, target_rest, prot_min, deficit_min, deficit_max, carb_max;
  const w = weight;

  if (goal === 'cut') {
    // Deficit ~500 kcal from each day's TDEE
    target_active = Math.max(1400, tdee_active - 500);
    target_rest = Math.max(1200, tdee_rest - 400);
    target_kcal = Math.max(1200, tdee - 500);
    prot_min = Math.round(w * 2.2); // 2.2g/kg preserves muscle in deficit
    deficit_min = 400; deficit_max = 800;
    carb_max = Math.round(target_rest * 0.35 / 4); // ~35% of rest calories from carbs
  } else if (goal === 'recomp') {
    target_active = Math.max(1500, tdee_active - 200);
    target_rest = Math.max(1300, tdee_rest - 150);
    target_kcal = Math.max(1400, tdee - 200);
    prot_min = Math.round(w * 2.4);
    deficit_min = 100; deficit_max = 350;
    carb_max = Math.round(target_rest * 0.40 / 4);
  } else if (goal === 'maintain') {
    target_active = tdee_active;
    target_rest = tdee_rest;
    target_kcal = tdee;
    prot_min = Math.round(w * 1.8);
    deficit_min = -150; deficit_max = 150;
    carb_max = Math.round(target_kcal * 0.45 / 4);
  } else { // bulk
    target_active = tdee_active + 200;
    target_rest = tdee_rest + 200;
    target_kcal = tdee + 300;
    prot_min = Math.round(w * 2.2);
    deficit_min = -600; deficit_max = -150;
    carb_max = Math.round(target_kcal * 0.50 / 4);
  }

  return {
    bmr, neat, tdee, tdee_active, tdee_rest,
    target_kcal,
    target_cf: target_active,   // same field name as Charly
    target_rest,
    target_active,
    prot_min,
    deficit_min_cf: deficit_min,   // CF day deficit range
    deficit_max_cf: deficit_max,
    deficit_min_rest: deficit_min, // rest day same for now
    deficit_max_rest: deficit_max,
    deficit_min, deficit_max,
    carb_cf: carb_max,   // same field name as Charly
    carb_rest: Math.round(carb_max * 0.85), // rest days slightly lower carbs
    carb_max
  };
}

// ── Security: escape user input before rendering as HTML ──
function escapeHTML(s) {
  if (typeof s !== 'string') return String(s||'');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function save() {
  try {
    if (APP.activeProfileId) {
      APP.allTrackingData[APP.activeProfileId] = {
        day:APP.day, rest:APP.rest, meal:APP.meal, chk:APP.chk, qty:APP.qty,
        mult:APP.mult, act:APP.act, sup:APP.sup, echk:APP.echk, eqty:APP.eqty,
        emult:APP.emult, cust:APP.cust, cchk:APP.cchk, cqty:APP.cqty, cmult:APP.cmult,
        atun:APP.atun, actBurn:APP.actBurn||{}, walkMins:APP.walkMins||{}
      };
    }
    // Always sync APP.profile back to APP.profiles[] before serializing
    // This ensures notifSettings and any other profile-level changes persist
    if (APP.profile && APP.profiles) {
      const idx = APP.profiles.findIndex(x => x.id === APP.profile.id);
      if (idx >= 0) {
        // Merge — don't overwrite computed fields, just sync mutable ones
        if (APP.profile.notifSettings) APP.profiles[idx].notifSettings = APP.profile.notifSettings;
      }
    }
    localStorage.setItem('cvr_app', JSON.stringify(APP));
  } catch(e){}
}
function load() {
  try {
    const d = localStorage.getItem('cvr_app');
    if (d) { const p = JSON.parse(d); if (p && typeof p==='object') Object.assign(APP, p); }
  } catch(e) { try { localStorage.removeItem('cvr_app'); } catch(e2){} }
}

function loadProfileTracking(profileId) {
  const td = (APP.allTrackingData||{})[profileId] || {};
  APP.day = td.day || currentDayId();
  APP.rest = td.rest||{}; APP.meal = td.meal||{}; APP.chk = td.chk||{};
  APP.qty = td.qty||{}; APP.mult = td.mult||{}; APP.act = td.act||{};
  APP.sup = td.sup||{}; APP.echk = td.echk||{}; APP.eqty = td.eqty||{};
  APP.emult = td.emult||{}; APP.cust = td.cust||{}; APP.cchk = td.cchk||{};
  APP.cqty = td.cqty||{}; APP.cmult = td.cmult||{}; APP.atun = td.atun||0;
  APP.actBurn = td.actBurn||{}; APP.actEditMode = {}; APP.walkMins = td.walkMins||{};
  // Restore notifSettings from profiles array into APP.profile
  if (APP.profile && APP.profiles) {
    const stored = APP.profiles.find(x => x.id === profileId);
    if (stored?.notifSettings) APP.profile.notifSettings = stored.notifSettings;
  }
}

function ensureCharlyProfile() {
  if (!APP.profiles) APP.profiles = [];
  const idx = APP.profiles.findIndex(p => p.id==='charly');
  // Fields that the user can change and should be preserved across const resets
  const PRESERVE = ['weight','waist','neck','age','target_weight','target_fat','start_weight','start_waist','weight_updated_at','current_fat','goal','eating','activity','mealstyle','city','cf_days','exercise_days','notifSettings'];
  if (idx < 0) {
    APP.profiles.unshift({...CHARLY_PROFILE});
  } else {
    const existing = APP.profiles[idx];
    const updated = {...CHARLY_PROFILE};
    PRESERVE.forEach(k => { if(existing[k] !== undefined) updated[k] = existing[k]; });
    APP.profiles[idx] = updated;
  }
}

function switchProfile(profileId) {
  const p = APP.profiles.find(x => x.id===profileId);
  if (!p) return;
  if (APP.activeProfileId) {
    if (!APP.allTrackingData) APP.allTrackingData = {};
    APP.allTrackingData[APP.activeProfileId] = {
      day:APP.day, rest:APP.rest, meal:APP.meal, chk:APP.chk, qty:APP.qty,
      mult:APP.mult, act:APP.act, sup:APP.sup, echk:APP.echk, eqty:APP.eqty,
      emult:APP.emult, cust:APP.cust, cchk:APP.cchk, cqty:APP.cqty, cmult:APP.cmult, atun:APP.atun,
      actBurn:APP.actBurn||{}, walkMins:APP.walkMins||{}
    };
  }
  APP.profile = p.isCharly ? APP.profiles.find(x=>x.id==='charly')||{...CHARLY_PROFILE} : p;
  APP.activeProfileId = profileId;
  loadProfileTracking(profileId);
  APP.screen = 'tracker';
  scheduleLocalReminders(); // reload this profile's notification schedule
  save(); render();
}

// ══════════════════════════════════════════════
// COMPUTED HELPERS
// ══════════════════════════════════════════════
function t(key) { return T[APP.lang][key] || T.en[key] || key; }
function getProfile() { return APP.profile || null; }

function isCFDay(d) {
  const p = getProfile();
  if (!p) return false;
  const idx = dayIndex(d);
  if (p.isCharly) return [0,2,4].includes(idx); // Mon, Wed, Fri
  return p.cf_days ? p.cf_days.includes(idx) : false;
}
function charlyDayIsCF(d) {
  return [0,2,4].includes(dayIndex(d)); // Mon=0, Wed=2, Fri=4
}
function dayIndex(d) {
  // Maps day ID → 0-based Mon-Sun index (Mon=0 ... Sun=6)
  const map = {
    'lun':0,'mar':1,'mie':2,'mié':2,'jue':3,'vie':4,'sab':5,'sáb':5,'dom':6,
    'mon':0,'tue':1,'wed':2,'thu':3,'fri':4,'sat':5,'sun':6
  };
  return map[d.toLowerCase()] ?? -1;
}
// JS getDay() → Mon-Sun 0-based index (Mon=0)
function jsDayToIdx(jsDay){ return jsDay===0?6:jsDay-1; }
function idxToJsDay(idx){ return idx===6?0:idx+1; }
function currentDayId() {
  const i = new Date().getDay(); // 0=Sun
  const days7 = ['dom','lun','mar','mié','jue','vie','sáb'];
  return days7[i];
}

function getDayList() {
  const p = getProfile();
  const lang = APP.lang;
  const dayIds = ['lun','mar','mie','jue','vie','sab','dom'];
  const labels = t('days'); // Mon-Sun or Lun-Dom
  return dayIds.map((id,i) => ({
    id, label: labels[i],
    cf: p && p.isCharly ? charlyDayIsCF(id) : (p && p.cf_days ? p.cf_days.includes(i) : false)
  }));
}

function getNEAT(p) {
  // Returns the non-exercise base expenditure above BMR
  // For Charly: use stored neat field
  // For generic profiles: use stored tdee_rest - bmr (which equals BMR×mult - BMR)
  if (p.neat) return p.neat;
  if (p.tdee_rest && p.bmr) return p.tdee_rest - p.bmr;
  // Fallback estimate
  const baseMult = { sedentary:1.2, light:1.3, moderate:1.4, very:1.5 };
  return Math.round(p.bmr * ((baseMult[p.activity]||1.4) - 1));
}

function getTDEE(d) {
  // Base TDEE = BMR + all non-exercise activity (stored as tdee_rest for generic profiles)
  // Activity burns (walk, exercise) added dynamically in calc()
  const p = getProfile();
  if (!p) return 2000;
  // Use stored tdee_rest if available — this is the exact base calcMacros used
  if (p.tdee_rest) return p.tdee_rest;
  // Charly: bmr + neat
  const bmr = p.bmr || _macros(p).bmr;
  return bmr + getNEAT(p);
}

function _macros(p) {
  if (!p._macroCache || p._macroCacheWeight !== p.weight) {
    p._macroCache = calcMacros(p);
    p._macroCacheWeight = p.weight;
  }
  return p._macroCache;
}

function getTargetKcal(d) {
  const p = getProfile();
  if (!p) return 1700;
  // Use profile's stored targets (works for both Charly and generic)
  if (isCFDay(d)) {
    return p.target_cf || p.target_active || _macros(p).target_active || _macros(p).target_kcal;
  }
  return p.target_rest || _macros(p).target_rest || _macros(p).target_kcal;
}

function getProtMin() {
  const p = getProfile();
  if (!p) return 150;
  return p.prot_min || _macros(p).prot_min;
}

function getCarbMax(d) {
  const p = getProfile();
  if (!p) return 180;
  if (isCFDay(d)) return p.carb_cf || _macros(p).carb_max;
  return p.carb_rest || _macros(p).carb_max;
}

function getDeficitRange(d) {
  const p = getProfile();
  if (!p) return [350,700];
  if (isCFDay(d)) {
    return [p.deficit_min_cf || _macros(p).deficit_min, p.deficit_max_cf || _macros(p).deficit_max];
  }
  return [p.deficit_min_rest || _macros(p).deficit_min, p.deficit_max_rest || _macros(p).deficit_max];
}

// ══════════════════════════════════════════════
// SNACKS / SUPPLEMENTS
// ══════════════════════════════════════════════
function getSupps() {
  const p = getProfile();
  if (!p) return [];
  // Supplements show for all users — Charly has specific ones, others get generic creatine
  if (p.isCharly) return CHARLY_SUPPS;
  return [
    {id:'am', label:{en:'Creatine 5g + electrolytes',es:'Creatina 5g + electrolitos'}, time:{en:'Morning',es:'Mañana'}},
    {id:'pm', label:{en:'Creatine 5g + electrolytes',es:'Creatina 5g + electrolitos'}, time:{en:'Afternoon',es:'Tarde'}},
  ];
}
function getSnackA() { return CHARLY_SA(APP.lang); }
function getSnackB() { return CHARLY_SB(APP.lang); }
function getSnackItems(type) { return type === 'A' ? getSnackA() : getSnackB(); }
function getExtras(d) {
  const p = getProfile();
  const l = APP.lang;
  if (!p || !p.isCharly) return CHARLY_EX(l).slice(0,4);
  const m = getMeal(d);
  if (!m) return CHARLY_EX(l);
  const sn = getSnackItems(m.snack).map(x => x.name);
  return CHARLY_EX(l).filter(e => !sn.includes(e.name));
}
function getExtraSnacks() { return CHARLY_EXT(APP.lang); }

// ══════════════════════════════════════════════
// RESTAURANTS / MEALS
// ══════════════════════════════════════════════
function getRests(d) {
  const p = getProfile();
  if (!p) return [];
  if (p.isCharly) return buildCharlyRests(d);
  return buildGenericRests(p, APP.lang);
}
function _findRest(rid, d) {
  // Find a restaurant by ID — checks getRests() AND dinner variants (rid ending in _dinner)
  const allRests = getRests(d);
  // Direct match
  let r = allRests.find(x => x.id === rid);
  if (r) return r;
  // Dinner variant: strip _dinner suffix and find base restaurant, return with modified id
  if (rid.endsWith('_dinner')) {
    const baseId = rid.replace('_dinner','');
    const base = allRests.find(x => x.id === baseId);
    if (base) return {...base, id: rid};
  }
  return null;
}

function getMeal(d, rid) {
  const s = APP.meal[d];
  if (!s) return null;
  if (rid !== undefined) {
    const i = s[rid];
    if (i === undefined) return null;
    const r = _findRest(rid, d);
    if (r && r.meals[i]) return { ...r.meals[i], _rid: rid, _midx: i };
    return null;
  }
  // Legacy: return first found (OMAD/Charly)
  for (const key of Object.keys(s)) {
    const r = _findRest(key, d);
    if (r && r.meals[s[key]]) return { ...r.meals[s[key]], _rid: key, _midx: s[key] };
  }
  return null;
}

function allItems(d) {
  const s = APP.meal[d];
  if (!s) return [];
  let items = [];
  // Iterate ALL selected meals (lunch, dinner, etc.) by reading meal keys directly
  for (const rid of Object.keys(s)) {
    const mi = s[rid];
    const r = _findRest(rid, d);
    if (!r || !r.meals[mi]) continue;
    const m = r.meals[mi];
    const main = m.items.map((x,j) => ({...x, id:'m'+rid+'_'+j}));
    const snk = m.snack ? getSnackItems(m.snack) : [];
    const at = getProfile()?.isCharly ? Array.from({length:m.atun||0}, (_,j) => ({...getATUN(APP.lang), id:'at'+j})) : [];
    items = [...items, ...main, ...snk, ...at];
  }
  return items;
}
function exItems(d) { return getExtras(d); }

// ══════════════════════════════════════════════
// CALC
// ══════════════════════════════════════════════
function calc(d) {
  let k=0,p=0,cb=0,ft=0;
  const ch=APP.chk[d]||{},q=APP.qty[d]||{},mu=APP.mult[d]||{};

  // Main meal items
  allItems(d).forEach(x=>{
    const m=mu[x.id]||1;
    const tt=(!!ch[x.id]||(q[x.id]||0)>0)?(1+(q[x.id]||0))*m:0;
    k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;ft+=(x.fat||0)*tt;
  });

  // Breakfast items
  const BFDB = FDB.filter(f=>f.cat==='Breakfast');
  BFDB.forEach((f,i)=>{
    const id='bf'+i;
    const m=mu[id]||1;
    const tt=(!!ch[id]||(q[id]||0)>0)?(1+(q[id]||0))*m:0;
    if(tt>0){k+=f.k*tt;p+=f.p*tt;cb+=(f.c||0)*tt;ft+=(f.f||0)*tt;}
  });

  // Extra/snack items
  const ec=APP.echk[d]||{},eq2=APP.eqty[d]||{},em=APP.emult[d]||{};
  [...exItems(d),...getExtraSnacks()].forEach(x=>{
    const m=em[x.id]||1;
    const tt=(!!ec[x.id]||(eq2[x.id]||0)>0)?(1+(eq2[x.id]||0))*m:0;
    k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;ft+=(x.fat||0)*tt;
  });

  // Custom/searched foods
  const cc=APP.cchk[d]||{},cq=APP.cqty[d]||{},cm=APP.cmult[d]||{};
  (APP.cust[d]||[]).forEach(x=>{
    const m=cm[x.id]||1;
    const tt=(!!cc[x.id]||(cq[x.id]||0)>0)?(1+(cq[x.id]||0))*m:0;
    k+=x.kcal*tt;p+=x.prot*tt;cb+=(x.carb||0)*tt;ft+=(x.fat||0)*tt;
  });
  const cf=isCFDay(d);
  const ac=APP.act[d]||{};let b=0;
  const pr=getProfile();
  let walkBurn=300, cfBurn=450;
  if(pr && !pr.isCharly){
    walkBurn=150;
    cfBurn=pr.exercise_burn||400;
  }
  // walkMins takes priority: duration * 4 kcal/min
  const walkMinsVal = (APP.walkMins&&APP.walkMins[d]) || (pr&&pr.isCharly?75:30);
  walkBurn = Math.round(walkMinsVal * 4);
  // Manual burn overrides (for workout row)
  const customBurns=(APP.actBurn&&APP.actBurn[d])||{};
  const wBurn=walkBurn; // walk always derives from minutes
  const cBurn=customBurns.cf||cfBurn;
  const acts=cf?[{id:'walk',burn:wBurn},{id:'cf',burn:cBurn}]:[{id:'walk',burn:wBurn}];
  acts.forEach(a=>{if(ac[a.id])b+=a.burn;});
  // TDEE is fully dynamic: BMR+NEAT base + whatever activity was actually marked today
  const tdeeBase = getTDEE(d); // BMR + NEAT only
  const tdee = tdeeBase + b;   // + actual activity burned
  const def=tdee-Math.round(k);
  const [dm,dx]=getDeficitRange(d);
  let st;
  if(def<0)st='over';
  else if(def<dm)st='excess';
  else if(def<=dx)st='ok';
  else st='low';
  return{k:Math.round(k),p:Math.round(p),cb:Math.round(cb),ft:Math.round(ft),b,tdee,def,st,dm,dx};
}

// ══════════════════════════════════════════════
// STEP MULT
// ══════════════════════════════════════════════
function stepM(v,dir){const i=MSTEPS.indexOf(v);return MSTEPS[Math.max(0,Math.min(MSTEPS.length-1,i+dir))];}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
function srch(q){
  if(!q||q.length<2)return{list:[],type:'n'};
  const ql=q.toLowerCase().trim();
  const protKeys=['proteina','proteína','protein','high protein','alta proteina','alta proteína'];
  const lcKeys=['bajo cal','low cal','lowcal','bajo calorias','bajo calorías'];
  const hcKeys=['alta carbos','high carb','carbos altos','alto carbo'];
  const hmKeys=['home cooked','homemade','home meal','home meals','casero','comida casera','cocinado en casa','home cook'];
  if(protKeys.includes(ql))return{list:PROT.slice(0,15),type:'p'};
  if(lcKeys.includes(ql))return{list:LCAL.slice(0,15),type:'l'};
  if(hcKeys.includes(ql))return{list:HCARB.slice(0,15),type:'h'};
  if(hmKeys.includes(ql))return{list:HOMEMEALS.slice(0,20),type:'hm'};
  const ts=ql.split(/\s+/).filter(Boolean);
  return{list:FDB.filter(f=>ts.every(t2=>f.n.toLowerCase().includes(t2))).slice(0,10),type:'n'};
}

// ══════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════
function row(d,it,tp){
  const isE=tp==='e',isC=tp==='c';
  const ch=isE?(APP.echk[d]||{}):(isC?(APP.cchk[d]||{}):(APP.chk[d]||{}));
  const qs=isE?(APP.eqty[d]||{}):(isC?(APP.cqty[d]||{}):(APP.qty[d]||{}));
  const ms=isE?(APP.emult[d]||{}):(isC?(APP.cmult[d]||{}):(APP.mult[d]||{}));
  const dn=!!ch[it.id],eq=qs[it.id]||0,mult=ms[it.id]||1,mA=mult!==1;
  const tf=isE?'tE':isC?'tC':'tI',inf=isE?'iE':isC?'iC':'iQ',df2=isE?'dE':isC?'dC':'dQ';
  const mpf=isE?'mEP':isC?'mCP':'mMP',mmf=isE?'mEM':isC?'mCM':'mMM';
  const dc=dn?'done':'';
  // displayUnits = 1 base + extras. Pressing + immediately updates the shown macros.
  const units = 1 + eq;
  const shownK = Math.round(it.kcal * units * mult);
  const shownP = Math.round(it.prot * units * mult);
  const shownC = Math.round((it.carb||0) * units * mult);
  const shownF = Math.round((it.fat||0) * units * mult);
  // Colour: green when checked, amber when qty added but not yet checked, normal otherwise
  const macCol = dn ? 'var(--green)' : eq > 0 ? 'var(--amber)' : '';
  const unitsLabel = units > 1 ? ` <span style="font-size:9px;opacity:.85">×${units}</span>` : '';
  const multLabel = mA ? ` <span style="font-size:9px;opacity:.7">${MLBLS[mult]||mult+'×'}</span>` : '';
  const fatStr = shownF > 0 ? ` · ${shownF}g F` : '';
  const macStr = `${shownK}kcal · ${shownP}g P · ${shownC}g C${fatStr}${unitsLabel}${multLabel}`;
  const mac = macCol ? `<span style="color:${macCol}">${macStr}</span>` : macStr;
  const bdg = isC ? `<span class="cbadge">${t('searched')}</span>` : '';
  return`<div class="irow">
    <div class="chk ${dc}" onclick="${tf}('${d}','${it.id}')"></div>
    <button class="qb p" onclick="${inf}('${d}','${it.id}',event)">+</button>
    ${eq>0?`<span class="qn">+${eq}</span><button class="qb" style="width:18px;height:18px;font-size:11px" onclick="${df2}('${d}','${it.id}',event)">−</button>`:''}
    <div class="iinfo">
      <span class="iname ${dc}">${escapeHTML(it.name)}${bdg}</span>
      <span class="imac ${dc}">${mac}</span>
    </div>
    <div class="mwrap">
      <button class="mb" onclick="${mmf}('${d}','${it.id}',event)">−</button>
      <span class="ml${mA?' act':''}">${MLBLS[mult]||mult+'×'}</span>
      <button class="mb" onclick="${mpf}('${d}','${it.id}',event)">+</button>
    </div>
  </div>`;
}

    tl.ob_goals.forEach(g => {

    const selDur = od.exercise_duration || '60';

    <div class="ob-sub">${tl.ob_exercise_sub}</div>
    <div class="ob-cards" style="margin-bottom:16px">`;

      </div>`;

    dayLabels.forEach((dl,i) => {

      const sel = selDur===val;

    <div class="ob-sub">${tl.ob_eating_sub}</div>

    tl.ob_eatings.forEach(e => {

        <div class="ob-card-body">
          <div class="ob-card-title">${e.title}</div>
          <div class="ob-card-desc">${e.desc}</div>
        </div>
        <div class="ob-check"></div>
      </div>`;
    });
    html += `</div>`;
  } else if (step === 7) {
    // Meal style
    html += `<div class="ob-title">${tl.ob_mealstyle_title}</div>
    <div class="ob-sub">${tl.ob_mealstyle_sub}</div>
    <div class="ob-cards">`;
    tl.ob_mealstyles.forEach(ms => {
      html += `<div class="ob-card${od.mealstyle===ms.id?' selected':''}" onclick="obSet('mealstyle','${ms.id}')">
        <div class="ob-card-icon">${ms.icon}</div>
        <div class="ob-card-body">
          <div class="ob-card-title">${ms.title}</div>
          <div class="ob-card-desc">${ms.desc}</div>
        </div>
        <div class="ob-check"></div>
      </div>`;
    });
    html += `</div>`;
    // Show city input if delivery or both selected
    if (od.mealstyle === 'delivery' || od.mealstyle === 'both') {
      const cityQuickPicks = ['Wembley Park, London','Central London','Manchester','Birmingham','Glasgow','Dublin','Buenos Aires','Madrid','Barcelona','New York','Sydney','Toronto'];
      const cityStatus = APP._cityStatus || 'idle'; // idle | checking | valid | invalid
      const cityStatusHtml = {
        idle: '',
        checking: `<div style="font-size:11px;color:var(--text3);margin-top:4px">🔍 ${lang==='es'?'Verificando ciudad...':'Checking city...'}</div>`,
        valid: `<div style="font-size:11px;color:var(--green);margin-top:4px">✓ ${APP._cityResolved||od.city} ${lang==='es'?'— Ciudad válida':'— Valid location'}</div>`,
        invalid: `<div style="font-size:11px;color:var(--red,#e55);margin-top:4px">✗ ${lang==='es'?'Ciudad no encontrada. Probá otro nombre o usá las sugerencias.':'Location not found. Try another name or use the suggestions.'}</div>`,
      }[cityStatus]||'';
      html += `<div class="ob-title" style="font-size:16px;margin-bottom:6px;margin-top:8px">
        ${lang==='es'?'¿En qué zona pedís delivery?':'Where do you order delivery?'}
      </div>
      <div class="ob-sub" style="margin-bottom:10px">${lang==='es'?'Esto nos permite mostrarte restaurantes relevantes a tu zona.':'This lets us show you relevant restaurants for your area.'}</div>
      <div class="ob-inputs">
        <div class="ob-input-group">
          <input class="ob-input" type="text" id="city-input" placeholder="${lang==='es'?'Ej: Wembley Park, Londres':'E.g. Wembley Park, London'}" value="${od.city||''}" oninput="obSetCityInput(this.value)" onchange="obSetCityInput(this.value)" style="font-size:15px;padding:12px">
        </div>
      </div>
      ${cityStatusHtml}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0">
        ${cityQuickPicks.map(c=>`<button onclick="obSetCityQuick('${c}')" style="padding:5px 10px;border-radius:16px;border:1.5px solid ${od.city===c?'var(--green)':'var(--border2)'};background:${od.city===c?'var(--green)':'transparent'};color:${od.city===c?'#fff':'var(--text3)'};font-size:11px;cursor:pointer">${c}</button>`).join('')}
      </div>`;
    }
  } else if (step === 8) {
    // Goal targets (weight + body fat %)
    const goal = od.goal || 'cut';
    const showFat = ['cut','recomp'].includes(goal);
    const showWeight = ['cut','bulk','recomp'].includes(goal);
    const isMaintain = goal === 'maintain';
    html += `<div class="ob-title">${lang==='es'?'Tu objetivo específico':'Your specific target'}</div>
    <div class="ob-sub">${lang==='es'
      ?'Esto nos permite mostrarte el progreso hacia tu meta en la pantalla principal.'
      :'This lets us show your progress towards your goal on the main screen.'}</div>`;
    if(isMaintain){
      html += `<div style="padding:20px;text-align:center;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border2);margin-bottom:20px">

      </div>`;
    } else {
      html += `<div class="ob-inputs">`;
      if(showWeight){
        html += `<div class="ob-input-group">
          <label class="ob-label">${lang==='es'?'Peso objetivo':'Target weight'}</label>
          <input class="ob-input" type="number" inputmode="decimal" placeholder="${od.weight?Math.round(parseFloat(od.weight||75)*0.9):68}" value="${od.target_weight||''}" onchange="obSetInput('target_weight',this.value)" oninput="obSetInput('target_weight',this.value)">
          <span class="ob-unit">kg</span>
        </div>`;
      }
      if(showFat){
        html += `<div class="ob-input-group">
          <label class="ob-label">${lang==='es'?'% grasa objetivo':'Target body fat %'}</label>
          <input class="ob-input" type="number" inputmode="decimal" placeholder="${goal==='cut'?'12':'15'}" value="${od.target_fat||''}" onchange="obSetInput('target_fat',this.value)" oninput="obSetInput('target_fat',this.value)">
          <span class="ob-unit">%</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:-4px;padding:0 2px;line-height:1.4">${lang==='es'
          ?'Referencia: atlético 10-14% · fitness 15-19% · promedio 20-24%'
          :'Reference: athletic 10-14% · fitness 15-19% · average 20-24%'}</div>`;
      }
      html += `</div>`;
    }
  } else if (step === 9) {
    // Diet + name
    html += `<div class="ob-title">${tl.ob_diet_title}</div>
    <div class="ob-sub">${tl.ob_diet_sub}</div>
    <div class="ob-multi">`;
    tl.ob_diets.forEach(d => {
      const sel = od.diet.includes(d.id);
      html += `<div class="ob-chip${sel?' selected':''}" onclick="obToggleDiet('${d.id}')">${sel?'✓ ':''}${d.label}</div>`;
    });
    html += `</div>`;
    html += `<div class="ob-title" style="margin-top:8px">${tl.ob_name_title}</div>
    <div class="ob-sub">${tl.ob_name_sub}</div>
    <div class="ob-inputs">
      <div class="ob-input-group">
        <input class="ob-input" type="text" placeholder="${tl.ob_name_placeholder}" value="${od.name||''}" onchange="obSetInput('name',this.value)" oninput="obSetInput('name',this.value)" style="font-size:17px;padding:14px">
      </div>
    </div>`;
  }

  // Navigation buttons
  const canNext = obCanNext(step, od, tl);
  if (step === TOTAL_STEPS - 1) {
    html += `<button class="ob-btn" onclick="obFinish()" ${canNext?'':'disabled'}>${tl.ob_finish}</button>`;
  } else {
    html += `<button class="ob-btn" onclick="obNext()" ${canNext?'':'disabled'}>${tl.ob_next}</button>`;
  }
  if (step > 0) {
    html += `<button class="ob-btn ob-btn-secondary" onclick="obBack()">${tl.ob_back}</button>`;
  }
  html += `</div>`;
  return renderTopbar(false) + html;
}

function obCanNext(step, od, tl) {
  if (step === 0) return !!od.lang;
  if (step === 1) return !!od.sex;
  if (step === 2) return od.age && od.weight && od.height;
  if (step === 3) return !!od.goal;
  if (step === 4) return !!od.activity;
  if (step === 5) return !!od.exercise_type && (od.exercise_days||[]).length > 0;
  if (step === 6) return !!od.eating;
  if (step === 7) {
    if (!od.mealstyle) return false;
    if (od.mealstyle === 'delivery' || od.mealstyle === 'both') {
      // Require a validated city
      return APP._cityStatus === 'valid' && !!(od.city);
    }
    return true;
  }
  if (step === 8) return true;
  if (step === 9) return od.name && od.name.trim().length > 0;
  return true;
}

          <div class="ob-card-icon">${g.icon}</div>
          <div class="ob-card-body"><div class="ob-card-title">${g.title}</div><div class="ob-card-desc">${g.desc}</div></div>

        ${tl.ob_activities.map(a=>`<div class="ob-card${(ed.activity||p.activity)===a.id?' selected':''}" onclick="seSet('activity','${a.id}')">
          <div class="ob-card-icon">${a.icon}</div>
          <div class="ob-card-body"><div class="ob-card-title">${a.title}</div><div class="ob-card-desc">${a.desc}</div></div>
          <div class="ob-check"></div>

      <div class="sec">${tl.ob_eating_title||'Eating pattern'}</div>
      <div class="ob-cards">
        ${tl.ob_eatings.map(e=>`<div class="ob-card${(ed.eating||p.eating)===e.id?' selected':''}" onclick="seSet('eating','${e.id}')">
          <div class="ob-card-icon">${e.icon}</div>
          <div class="ob-card-body"><div class="ob-card-title">${e.title}</div><div class="ob-card-desc">${e.desc}</div></div>
          <div class="ob-check"></div>
        </div>`).join('')}
      </div>

      <div class="sec">${tl.ob_mealstyle_title||'Meal style'}</div>
      <div class="ob-cards">
        ${tl.ob_mealstyles.map(ms=>`<div class="ob-card${(ed.mealstyle||p.mealstyle)===ms.id?' selected':''}" onclick="seSet('mealstyle','${ms.id}')">
          <div class="ob-card-icon">${ms.icon}</div>
          <div class="ob-card-body"><div class="ob-card-title">${ms.title}</div><div class="ob-card-desc">${ms.desc}</div></div>
          <div class="ob-check"></div>
        </div>`).join('')}
      </div>
      ${((ed.mealstyle||p.mealstyle)==='delivery'||(ed.mealstyle||p.mealstyle)==='both')?`
      <div class="sec">${APP.lang==='es'?'Zona de delivery':'Delivery area'}</div>
      <div class="ob-inputs">
        <div class="ob-input-group">
          <input class="ob-input" type="text" placeholder="${APP.lang==='es'?'Tu ciudad / zona':'Your city / area'}" value="${ed.city||p.city||''}" oninput="seSetCityInput(this.value)">
          ${APP._seCityStatus==='valid'?`<div style="font-size:10px;color:var(--green);margin-top:3px">✓ ${APP._seCityResolved||''}</div>`:''}
          ${APP._seCityStatus==='invalid'?`<div style="font-size:10px;color:var(--red,#e55);margin-top:3px">✗ ${APP.lang==='es'?'Ciudad no encontrada':'Location not found'}</div>`:''}
        </div>
      </div>`:''}

      ${!p.isCharly ? `<div class="sec">${tl.ob_exercise_title||'Exercise'}</div>
      <div class="ob-cards">
        ${tl.ob_exercise_types.map(e=>`<div class="ob-card${(ed.exercise_type||p.exercise_type)===e.id?' selected':''}" onclick="seSet('exercise_type','${e.id}')">
          <div class="ob-card-icon">${e.icon}</div>
          <div class="ob-card-body"><div class="ob-card-title">${e.title}</div><div class="ob-card-desc">${e.desc}</div></div>
          <div class="ob-check"></div>
        </div>`).join('')}
      </div>
      <div class="sec" style="margin-top:4px">${APP.lang==='es'?'Días de entreno':'Training days'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;padding:0 12px 12px">
        ${(APP.lang==='es'?['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']:['Mon','Tue','Wed','Thu','Fri','Sat','Sun']).map((dl,i)=>{
          const curDays = ed.exercise_days||p.exercise_days||p.cf_days||[];
          const sel = curDays.includes(i);
          return `<div onclick="seToggleDay(${i})" style="width:40px;height:40px;border-radius:50%;border:2px solid ${sel?'var(--green)':'var(--border2)'};background:${sel?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:700;color:${sel?'#fff':'var(--text2)'}">${dl}</div>`;
        }).join('')}
      </div>` : ''}

      ${!p.isCharly ? `<div class="sec">${APP.lang==='es'?'Objetivo específico':'Specific target'}</div>
      <div class="ob-inputs">
        <div class="ob-input-row">
          <div class="ob-input-group">
            <label class="ob-label">${APP.lang==='es'?'Peso objetivo':'Target weight'}</label>
            <input class="ob-input" type="number" inputmode="decimal" placeholder="kg" value="${ed.target_weight||p.target_weight||''}" oninput="seSetInput('target_weight',this.value)">

          </div>
          <div class="ob-input-group">
            <label class="ob-label">${APP.lang==='es'?'% grasa objetivo':'Target body fat'}</label>
            <input class="ob-input" type="number" inputmode="decimal" placeholder="%" value="${ed.target_fat||p.target_fat||''}" oninput="seSetInput('target_fat',this.value)">
            <span class="ob-unit">%</span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text3);line-height:1.4;padding:0 2px">${APP.lang==='es'
          ?'Al guardar cambios de peso se actualiza automáticamente la fecha de última medición (usada para el recordatorio semanal).'
          :'When you save weight changes, the last measurement date updates automatically (used for the weekly reminder).'}</div>
      </div>` : ''}

      <button class="ob-btn" onclick="saveEdit()" style="margin-top:8px">
        ${APP.lang==='es'?'Guardar cambios ✓':'Save changes ✓'}
      </button>
      <button class="ob-btn ob-btn-secondary" onclick="cancelEdit()">
        ${APP.lang==='es'?'Cancelar':'Cancel'}
      </button>
    </div>`;
  }

  // ── NORMAL SETTINGS VIEW ──
  const m = p && !p.isCharly ? _macros(p) : null;
  const bmrVal = p?.bmr || (m?.bmr || 0);
  const tdeeVal = p?.tdee || (m?.tdee || 0);
  const targetActiveVal = p?.target_cf || (m?.target_active || m?.target_kcal || 0);
  const targetRestVal = p?.target_rest || (m?.target_rest || m?.target_kcal || 0);

  const goalLabel = (tl.ob_goals||[]).find(g=>g.id===p?.goal)?.title || p?.goal || '';
  const actLabel = (tl.ob_activities||[]).find(a=>a.id===p?.activity)?.title || p?.activity || '';

  let html = renderTopbar(false);
  html += `<div class="settings-screen">
    <button class="back-btn" onclick="goTracker()">← ${tl.back.replace('← ','')}</button>

  if (p) {
    html += `<div class="sec">${tl.my_profile}</div>
    <div class="profile-card">

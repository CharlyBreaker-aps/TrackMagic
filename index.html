      <div class="profile-stats">
        <div class="pstat"><div class="pstat-v">${bmrVal}</div><div class="pstat-l">BMR</div></div>
        <div class="pstat"><div class="pstat-v">${tdeeVal}</div><div class="pstat-l">TDEE</div></div>
        <div class="pstat"><div class="pstat-v">${targetActiveVal}</div><div class="pstat-l">${APP.lang==='es'?'Target CF':'Target active'}</div></div>
        <div class="pstat"><div class="pstat-v">${targetRestVal}</div><div class="pstat-l">${APP.lang==='es'?'Target descanso':'Target rest'}</div></div>
      </div>
    </div>

    <div class="settings-card">
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.goal}</span><span class="settings-row-val">${goalLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.activity_level}</span><span class="settings-row-val">${actLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.eating_pattern}</span><span class="settings-row-val">${eatLabel}</span></div>
      <div class="settings-row" style="cursor:default"><span class="settings-row-label">${tl.weight_kg}</span><span class="settings-row-val">${p.weight} kg</span></div>
    </div>

    <button class="ob-btn" onclick="startEdit()" style="margin-top:4px">
      ✏️ ${tl.edit_profile}
    </button>`;
  }

  // ── PROFILES LIST ──
  const allProfiles = APP.profiles || [];
  html += `<div class="sec" style="margin-top:16px">${APP.lang==='es'?'Todos los perfiles':'All profiles'}</div>
  <div class="settings-card">`;
  allProfiles.forEach(prof => {
    const isActive = prof.id === APP.activeProfileId;
    const isCharly = prof.isCharly;
    html += `<div class="settings-row" style="cursor:${isActive?'default':'pointer'}">
      <span style="font-size:16px;margin-right:6px">${isCharly?'⭐':'👤'}</span>
      <span style="flex:1;font-size:13px;${isActive?'color:var(--green);font-weight:700':''}">
        ${prof.name||'User'}${isActive?` ✓`:''}
      </span>
      ${!isActive?`<button onclick="switchProfile('${prof.id}')" style="font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--green);color:var(--green);background:transparent;cursor:pointer;margin-right:6px">Switch</button>`:''}
      ${!isCharly?`<button onclick="deleteProfile('${prof.id}')" style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer">🗑</button>`:''}
    </div>`;
  });
  html += `<div class="settings-row" onclick="addNewProfile()" style="cursor:pointer;border-top:0.5px solid var(--border)">
    <span class="settings-row-label">➕ ${APP.lang==='es'?'Agregar nuevo perfil':'Add new profile'}</span>
    <span class="settings-row-arrow">›</span>
  </div>
  </div>`;

  html += renderNotifSettings();
  html += `</div>`;
  return html;
}

function renderHelp() {
  const isEs = APP.lang === 'es';
  const glossary = [
    { term:'BMR', full: isEs?'Tasa Metabólica Basal':'Basal Metabolic Rate', desc: isEs?'Las calorías que tu cuerpo quema en reposo absoluto — solo para mantenerte vivo (respirar, corazón, órganos). Es el piso de tu consumo calórico.':'Calories your body burns at complete rest — just to stay alive (breathing, heart, organs). It\'s the floor of your calorie needs.' },
    { term:'TDEE', full: isEs?'Gasto Energético Total Diario':'Total Daily Energy Expenditure', desc: isEs?'BMR + todas las calorías que quemás durante el día (actividad, ejercicio, digestión). Es tu consumo calórico real si querés mantener el peso.':'BMR + all calories you burn during the day (activity, exercise, digestion). This is your real calorie need to maintain weight.' },
    { term:'NEAT', full: isEs?'Termogénesis por Actividad sin Ejercicio':'Non-Exercise Activity Thermogenesis', desc: isEs?'Calorías quemadas por movimiento cotidiano que no es ejercicio estructurado: caminar, pararte, gesticular, cocinar, etc.':'Calories burned by daily movement that isn\'t structured exercise: walking, standing, gesturing, cooking, etc.' },
    { term:'Déficit calórico', full: isEs?'Déficit calórico':'Caloric deficit', desc: isEs?'Cuando comés menos calorías de las que gastás. Es la única forma real de perder grasa. Un déficit de 500 kcal/día produce ~0.5kg de pérdida por semana.':'When you eat fewer calories than you burn. The only real way to lose fat. A 500 kcal/day deficit produces ~0.5kg of loss per week.' },
    { term:'Superávit calórico', full: isEs?'Superávit calórico':'Caloric surplus', desc: isEs?'Cuando comés más calorías de las que gastás. Necesario para ganar masa muscular. Un superávit de 200-300 kcal/día minimiza la ganancia de grasa.':'When you eat more calories than you burn. Needed to gain muscle. A 200-300 kcal/day surplus minimizes fat gain.' },
    { term: isEs?'Proteína (P)':'Protein (P)', full: isEs?'Macronutriente proteína':'Protein macronutrient', desc: isEs?'El macronutriente más importante en déficit. Preserva músculo mientras perdés grasa. Target: 2g por kg de peso corporal. Fuentes: pollo, pescado, huevos, lácteos, legumbres.':'The most important macronutrient in a deficit. Preserves muscle while losing fat. Target: 2g per kg of body weight. Sources: chicken, fish, eggs, dairy, legumes.' },
    { term: isEs?'Carbos (C)':'Carbs (C)', full: isEs?'Carbohidratos':'Carbohydrates', desc: isEs?'La principal fuente de energía del cuerpo. No son el enemigo — la cantidad importa. En días de entreno podés comer más. Fuentes: arroz, pasta, pan, frutas, avena.':'The body\'s main energy source. Not the enemy — quantity matters. On training days you can eat more. Sources: rice, pasta, bread, fruit, oats.' },
    { term: isEs?'Kcal':'Kcal', full: isEs?'Kilocaloría':'Kilocalorie', desc: isEs?'Unidad de energía de los alimentos. Lo que comunmente llamamos "caloría" es en realidad una kilocaloría. 1 kcal = 1 Cal (con C mayúscula).':'Unit of energy in food. What we commonly call a "calorie" is technically a kilocalorie. 1 kcal = 1 Cal (capital C).' },
    { term:'OMAD', full: isEs?'Una Comida Al Día':'One Meal A Day', desc: isEs?'Patrón de alimentación donde se concentra toda la ingesta calórica en una sola comida con una ventana de 1-14 horas. Popular por simplicidad y control de porciones.':'Eating pattern where all caloric intake is concentrated in a single meal within a 1-14 hour window. Popular for simplicity and portion control.' },
    { term: isEs?'Recomposición':'Recomposition', full: isEs?'Recomposición corporal':'Body recomposition', desc: isEs?'Perder grasa y ganar músculo al mismo tiempo. Posible con déficit mínimo + entrenamiento de fuerza. Proceso más lento que hacer cut o bulk por separado.':'Losing fat and gaining muscle simultaneously. Possible with a minimal deficit + strength training. Slower process than doing a dedicated cut or bulk.' },
    { term: isEs?'Cut':'Cut', full: isEs?'Fase de definición':'Cutting phase', desc: isEs?'Período de déficit calórico para reducir grasa corporal mientras se preserva músculo. Requiere alta proteína y entrenamiento de fuerza.':'Period of caloric deficit to reduce body fat while preserving muscle. Requires high protein and strength training.' },
    { term: isEs?'Bulk':'Bulk', full: isEs?'Fase de volumen':'Bulking phase', desc: isEs?'Período de superávit calórico para maximizar la ganancia muscular. Se acepta cierta ganancia de grasa. Se combina con entrenamiento de fuerza progresivo.':'Period of caloric surplus to maximize muscle gain. Some fat gain is accepted. Combined with progressive strength training.' },
    { term:'CF day', full: isEs?'Día de crossfit/entrenamiento':'CrossFit/training day', desc: isEs?'Día en que hacés ejercicio de alta intensidad. Podés comer más calorías porque gastaste más. La app ajusta automáticamente tu objetivo calórico según el día.':'Day when you do high-intensity exercise. You can eat more calories because you burned more. The app automatically adjusts your calorie target based on the day.' },
    { term: isEs?'Refeed':'Refeed', full: isEs?'Día de recarga':'Refeed day', desc: isEs?'Día estratégico donde comés en mantenimiento o superávit leve. Recarga el glucógeno muscular, sube leptina y ayuda psicológicamente. Útil después de períodos prolongados en déficit.':'Strategic day where you eat at maintenance or slight surplus. Recharges muscle glycogen, raises leptin and helps psychologically. Useful after extended deficit periods.' },
    { term: isEs?'Snack A / Snack B':'Snack A / Snack B', full: isEs?'Paquetes de snacks de Charly':'Charly\'s snack packs', desc: isEs?'Opciones de snack predefinidas para Charly. Snack A = cottage + huevos + pan (alta proteína, sin biltong). Snack B = todo lo anterior + biltong (mayor proteína y saciedad).':'Predefined snack options for Charly. Snack A = cottage + eggs + bread (high protein, no biltong). Snack B = everything above + biltong (higher protein and satiety).' },
  ];

  const sections = [
    { icon:'📊', title: isEs?'Stats del día (los 4 números arriba)':'Daily stats (4 numbers at top)', desc: isEs?'Muestra en tiempo real: kcal ingeridas, proteína total, carbos totales, y calorías quemadas por actividad. Los colores indican si estás en objetivo (verde), cerca (naranja) o fuera (rojo).':'Shows in real time: kcal ingested, total protein, total carbs, and calories burned by activity. Colors indicate if you\'re on target (green), close (orange), or off (red).' },
    { icon:'🎯', title: isEs?'Caja de déficit':'Deficit box', desc: isEs?'Muestra tu balance calórico del día: BMR + NEAT + actividad - lo que comiste = déficit real. Verde = estás en el rango objetivo. Naranja = comiste poco (déficit demasiado alto). Rojo = comiste de más.':'Shows your daily calorie balance: BMR + NEAT + activity - what you ate = real deficit. Green = you\'re in target range. Orange = ate too little (deficit too high). Red = ate too much.' },
    { icon:'🏋️', title: isEs?'Actividad física':'Physical activity', desc: isEs?'Marcá las actividades que hiciste hoy. El tiempo de caminata se puede ajustar con los botones de minutos. El ejercicio muestra las kcal calculadas automáticamente con opción de ajuste manual (✏️).':'Mark activities you did today. Walk duration can be adjusted with the minute buttons. Exercise shows auto-calculated kcal with manual adjustment option (✏️).' },
    { icon:'🍽️', title: isEs?'Plato principal':'Main meal', desc: isEs?'Elegí tu restaurant o tipo de comida, luego seleccioná el plato. Los ítems se despliegan con checkboxes para marcar lo que comiste. + agrega porciones extra, los botones −/+ ajustan el gramaje (½× hasta 2×).':'Choose your restaurant or food type, then select a dish. Items unfold with checkboxes to mark what you ate. + adds extra portions, −/+ buttons adjust serving size (½× to 2×).' },
    { icon:'🔍', title: isEs?'Buscador':'Search', desc: isEs?'Buscá cualquier alimento por nombre. Los tags filtran categorías: 🟢 alta proteína, 🔵 bajo cal, 🟠 alta carbos, 🏠 comida casera. Al agregar un alimento buscado aparece en la sección "Alimentos buscados" del plato.':'Search any food by name. Tags filter categories: 🟢 high protein, 🔵 low cal, 🟠 high carb, 🏠 home cooked. Adding a searched food shows it in the "Searched foods" section of your meal.' },
    { icon:'⚙️', title: isEs?'Settings':'Settings', desc: isEs?'Editá tu perfil (peso, edad, objetivo, ejercicio), cambiá entre perfiles, creá perfiles nuevos para otras personas, o eliminá perfiles que no uses.':'Edit your profile (weight, age, goal, exercise), switch between profiles, create new profiles for other people, or delete unused profiles.' },
  ];

  let html = renderTopbar(false);
  html += `<div class="settings-screen">
    <button class="back-btn" onclick="goTracker()">← ${isEs?'Volver':'Back'}</button>
    <div class="settings-title">❓ ${isEs?'Ayuda y Glosario':'Help & Glossary'}</div>

    <div style="margin-bottom:16px">
      <input id="help-search" class="sinp" type="text" placeholder="${isEs?'Buscar término...':'Search term...'}" oninput="filterHelp(this.value)" style="margin:0">
    </div>

    <div class="sec">${isEs?'Cómo usar la app':'How to use the app'}</div>
    <div id="help-sections">
      ${sections.map(s=>`<div class="settings-card" style="margin-bottom:8px;padding:12px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2)">
        <div style="font-size:20px;margin-bottom:6px">${s.icon}</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">${s.title}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">${s.desc}</div>
      </div>`).join('')}
    </div>

    <div class="sec" style="margin-top:8px">${isEs?'Glosario de términos':'Glossary'}</div>
    <div id="help-glossary">
      ${glossary.map(g=>`<div class="settings-card" style="margin-bottom:6px;border-radius:var(--radius);border:0.5px solid var(--border2);overflow:hidden" data-term="${g.term.toLowerCase()} ${g.full.toLowerCase()} ${g.desc.toLowerCase()}">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2)">
          <span style="font-size:13px;font-weight:800;color:var(--green);min-width:80px">${g.term}</span>
          <span style="font-size:11px;color:var(--text3);font-style:italic">${g.full}</span>
        </div>
        <div style="padding:8px 14px 10px;font-size:12px;color:var(--text2);line-height:1.5;background:var(--bg)">${g.desc}</div>
      </div>`).join('')}
    </div>
  </div>`;
  return html;
}

function filterHelp(q){
  const ql=q.toLowerCase().trim();
  document.querySelectorAll('#help-glossary [data-term]').forEach(el=>{
    el.style.display=(!ql||el.dataset.term.includes(ql))?'':'none';
  });
}

function renderTracker() {
  const p = getProfile();
  if (!p) { goOnboard(); return ''; }
  const d = APP.day || (APP.day = currentDayId());
  const cf = isCFDay(d);
  const {k,p2,cb,ft,b,tdee,def,st,dm,dx} = (() => { const r=calc(d); return {...r,p2:r.p}; })();
  const tK=getTargetKcal(d),tP=getProtMin(),tC=getCarbMax(d);
  const pct=Math.min(130,Math.round(k/tK*100));
  const pC=p2>=tP?'g':p2>=tP*.85?'a':'r';
  const kC=k>=tK*.9&&k<=tK*1.1?'g':k<tK*.9?'a':'r';
  const cC=cb<=tC?'b':cb<=tC*1.2?'a':'r';
  // When nothing logged yet, use a neutral "day in progress" state
  const dayNotStarted = k === 0;
  const STC={
    ok:   {lbl:t('def_ok'),    cls:'ok',    bc:'ok',    col:'var(--green)'},
    low:  {lbl:dayNotStarted ? (APP.lang==='es'?'Empezá a registrar tus comidas del día 📝':'Start logging today\'s meals 📝') : t('def_low'),
           cls:dayNotStarted?'pending':'low', bc:dayNotStarted?'pending':'low', col:dayNotStarted?'var(--text3)':'var(--amber)'},
    excess:{lbl:t('def_excess'),cls:'excess',bc:'excess',col:'var(--red)'},
    over:  {lbl:t('def_over'),  cls:'over',  bc:'over',  col:'var(--red)'}
  };
  const cfg=STC[st];
  const sc=APP.sup[d]||{};
  const supps=getSupps();
  const sd=supps.filter(x=>sc[x.id]).length;
  const rests=getRests(d),selSt=APP.meal[d]||{},curM=getMeal(d);
  const dayList=getDayList();
  const timing=t('timing_'+p.eating) || t('timing_omad');

  let h = renderTopbar();
  h += `<div class="tracker">`;
  // Day tabs
  h+=`<div class="day-tabs">`;
  dayList.forEach(x=>{h+=`<button class="dtab ${x.cf?'cf':'rs'}${x.id===d?' active':''}" onclick="setDay('${x.id}')">${x.label}${x.cf?t('cf_label'):''}</button>`;});
  h+=`</div>`;

  // Stats
  h+=`<div class="stats">
    <div class="stat"><div class="sv ${kC}">${k}</div><div class="sl">${t('kcal_in')}</div></div>
    <div class="stat"><div class="sv ${pC}">${p2}g</div><div class="sl">${t('protein')}</div></div>
    <div class="stat"><div class="sv ${cC}">${cb}g</div><div class="sl">${t('carbs')}</div></div>
    <div class="stat"><div class="sv" style="color:var(--text2)">${ft}g</div><div class="sl">${APP.lang==='es'?'grasas':'fats'}</div></div>
    <div class="stat"><div class="sv w">${b}</div><div class="sl">${t('activity')}</div></div>
  </div>`;

  // Deficit box
  h+=`<div class="def-box ${cfg.cls}">
    <div class="dr"><span>${t('bmr_neat')} <span style="font-size:9px;color:var(--text3)">(${APP.lang==='es'?'base sin ejercicio marcado':'base without marked exercise'})</span></span><span class="dv">${getTDEE(d)} kcal</span></div>
    <div class="dr"><span>${t('activity_label')} <span style="font-size:9px;color:var(--text3)">(${b===0?(APP.lang==='es'?'nada marcado aún':'nothing marked yet'):(APP.lang==='es'?'marcado hoy':'marked today')})</span></span><span class="dv" style="color:${b>0?'var(--green)':'var(--text3)'}">${b} kcal</span></div>
    <div class="dr" style="font-weight:600"><span>${t('total_tdee')}</span><span class="dv">${tdee} kcal</span></div>
    <div class="dhr"></div>
    <div class="dr"><span>${t('kcal_ingested')}</span><span class="dv">${k} kcal</span></div>
    <div class="dhr"></div>
    <div class="dm"><span class="dml">${t('estimated_deficit')}</span><span class="dmv" style="color:${cfg.col}">${def>=0?'−'+def:'+'+Math.abs(def)} kcal</span></div>
    <div class="dbadge ${cfg.cls}">${cfg.lbl}</div>
    <div class="prog"><div class="pf ${cfg.bc}" style="width:${Math.min(100,pct)}%"></div></div>
    <div class="dhint">${t('target_range')}: ${dm}–${dx} · ${t('intake_target')}: ${tK} kcal · ${t('carbs_target')}: ≤${tC}g</div>
  </div>`;

  // ── GOAL PROGRESS CARD ──
  const hasTarget = p.target_weight || p.target_fat;
  if(hasTarget) {
    const isEs = APP.lang==='es';

    // US Navy Body Fat Formula — uses actual neck if provided, otherwise estimates it
    // Male: BF% = 495/(1.0324 - 0.19077·log10(waist-neck) + 0.15456·log10(height)) - 450
    // Validated: waist=78.5cm, neck=39cm, height=173cm → 11.0% (matches calculator.net)
    function estimateBF(waist, height, sex, neckIn) {
      if (!waist || !height) return null;
      try {
        if (sex === 'male') {
          const neck = neckIn || Math.round(height * 0.212);
          if (waist <= neck) return null;
          const bf = 495 / (1.0324 - 0.19077 * Math.log10(waist - neck) + 0.15456 * Math.log10(height)) - 450;
          return Math.round(Math.max(4, Math.min(45, bf)) * 10) / 10;
        } else {
          const neck = neckIn || Math.round(height * 0.195);
          const hip = Math.round(waist * 1.12);
          if (waist + hip <= neck) return null;
          const bf = 495 / (1.29579 - 0.35004 * Math.log10(waist + hip - neck) + 0.22100 * Math.log10(height)) - 450;
          return Math.round(Math.max(10, Math.min(50, bf)) * 10) / 10;
        }
      } catch(e) { return null; }
    }

    const curWaist = p.waist;
    const startWaist = p.start_waist || p.waist;
    const curW = p.weight;
    const startW = p.start_weight || p.weight;
    const tgtW = p.target_weight;
    const tgtF = p.target_fat;
    const estBF = estimateBF(curWaist, p.height, p.sex, p.neck);
    const startBF = estimateBF(startWaist, p.height, p.sex, p.neck);

    const lastUpd = p.weight_updated_at || 0;
    const daysSinceUpd = Math.floor((Date.now()-lastUpd)/(1000*60*60*24));
    const needsReminder = daysSinceUpd >= 7;

    let progressHtml = '';

    // ── PRIMARY: Body fat progress (waist-driven) ──
    if (tgtF && estBF !== null) {
      const bfStart = startBF || estBF;
      const bfTotal = Math.abs(bfStart - tgtF) || 1;
      const bfDone = Math.abs(bfStart - estBF);
      const bfPct = Math.min(100, Math.round(bfDone / bfTotal * 100));
      const bfRemaining = Math.abs(estBF - tgtF).toFixed(1);
      const bfCloser = estBF > tgtF; // for cut goal
      const bfColor = estBF <= tgtF ? 'var(--green)' : (estBF - tgtF < 3 ? 'var(--amber)' : 'var(--text)');

      progressHtml += `<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">
          📏 ${isEs?'Grasa corporal estimada (medida de cintura)':'Estimated body fat (waist measurement)'}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px">
          <div>
            <span style="font-size:26px;font-weight:800;color:${bfColor}">${estBF}%</span>
            <span style="font-size:11px;color:var(--text3);margin-left:4px">${isEs?'actual':'current'}</span>
          </div>
          <div style="text-align:right">
            <span style="font-size:14px;font-weight:700;color:var(--green)">${tgtF}%</span>
            <span style="font-size:10px;color:var(--text3);display:block">${isEs?'objetivo':'target'}</span>
          </div>
        </div>
        <div style="height:10px;background:var(--bg3);border-radius:5px;overflow:hidden;position:relative">
          <div style="height:10px;background:${bfPct>=100?'var(--green)':'var(--green)'};border-radius:5px;width:${bfPct}%;transition:width .4s;opacity:${bfPct>=100?1:0.85}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px">
          <span>${bfCloser ? `${bfRemaining}% ${isEs?'para llegar':'to go'} · ${bfPct}% ${isEs?'del camino':'done'}` : (bfPct>0?`${isEs?'Objetivo alcanzado':'Target reached'} 🎉`:(isEs?'Empezaste hoy 💪':'Started today 💪'))}</span>
          <span>${isEs?'Cintura':'Waist'}: ${curWaist}cm</span>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;font-style:italic">
          ${isEs?'Estimación basada en cintura + altura. Actualizá la cintura en Settings para ver cambios reales.':'Estimate based on waist + height. Update waist in Settings to track real changes.'}
        </div>
      </div>`;
    } else if (tgtF && !curWaist) {
      progressHtml += `<div style="padding:10px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text3);margin-bottom:10px">
        📏 ${isEs?'Ingresá tu medida de cintura en Settings → Edit profile para ver tu % de grasa estimado.':'Add your waist measurement in Settings → Edit profile to see your estimated body fat %.'}
      </div>`;
    }

    // ── SECONDARY: Weight progress ──
    if (tgtW && curW) {
      const wTotal = Math.abs(startW - tgtW) || 1;
      const wDone = Math.abs(startW - curW);
      const wPct = Math.min(100, Math.round(wDone / wTotal * 100));
      const wRemaining = Math.abs(curW - tgtW).toFixed(1);
      progressHtml += `<div style="margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">
          ⚖️ ${isEs?'Peso':'Weight'}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span><strong style="color:var(--text)">${curW}kg</strong> <span style="color:var(--text3)">${isEs?'actual':'current'}</span></span>
          <span><strong style="color:var(--green)">${tgtW}kg</strong> <span style="color:var(--text3)">${isEs?'objetivo':'target'}</span></span>
        </div>
        <div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden">
          <div style="height:6px;background:var(--blue);border-radius:3px;width:${wPct}%;transition:width .4s"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">${wRemaining}kg ${isEs?'restantes':'remaining'} · ${wPct}% ${isEs?'completado':'done'}</div>
      </div>`;
    }

    h+=`<div style="margin:6px 12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 14px">
      <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">🎯 ${isEs?'Progreso hacia tu objetivo':'Progress towards your goal'}</div>
      ${progressHtml}
      ${needsReminder?`<div style="margin-top:8px;padding:8px 10px;background:#2e1c00;border:0.5px solid var(--amber);border-radius:8px;font-size:11px;color:var(--amber)">
        ⚠️ ${isEs
          ?`Hace ${daysSinceUpd} días que no actualizás tu peso/cintura. Actualizá en ⚙️ Settings → Edit profile.`
          :`It's been ${daysSinceUpd} days since you updated. Update in ⚙️ Settings → Edit profile.`}
      </div>`:''}
    </div>`;
  }
  if (timing && timing.length) {
    h+=`<div class="sec">${t('meal_timing')}</div>
    <div class="timing-banner">`;
    timing.forEach(ti=>{h+=`<div class="timing-item"><span class="timing-time">${ti.time}</span><span>${ti.label}</span></div>`;});
    h+=`</div>`;
  }

  // Supplements (Charly only)
  if (supps.length) {
    h+=`<div class="sec">${t('supplements')} — ${sd}/${supps.length} ${t('taken')}</div><div class="supp-card">`;
    supps.forEach(x=>{
      const dn=sc[x.id]?'done':'';
      const lbl=typeof x.label==='object'?x.label[APP.lang]:x.label;
      const tm=typeof x.time==='object'?x.time[APP.lang]:x.time;
      h+=`<div class="srow ${dn}" onclick="tS('${d}','${x.id}')"><div class="chk ${dn}"></div><span class="sname">${lbl}</span><span class="stag">${tm}</span></div>`;
    });
    h+=`</div>`;
  }

  // Activity — preload training days for non-Charly users if not yet set
  const ac=APP.act[d]||{};
  if(!p.isCharly && p.cf_days && ac._preloaded === undefined) {
    if (!APP.act[d]) APP.act[d]={};
    APP.act[d]._preloaded = true;
    if (isCFDay(d)) APP.act[d].cf = true;
    APP.act[d].walk = false; // walk starts unchecked, user decides
    save();
  }
  const acNow = APP.act[d]||{};

  // Build activity list based on profile
  let actDef;
  if(p.isCharly){
    actDef=cf
      ?[{id:'walk',name:APP.lang==='es'?'Caminata diaria (~75 min)':'Daily walk (~75 min)',burn:300,hint:APP.lang==='es'?'opcional · recomendado diario':'optional · recommended daily'},{id:'cf',name:APP.lang==='es'?'Sesión de crossfit (~60 min)':'Crossfit session (~60 min)',burn:450}]
      :[{id:'walk',name:APP.lang==='es'?'Caminata diaria (~75 min)':'Daily walk (~75 min)',burn:300,hint:APP.lang==='es'?'opcional · recomendado diario':'optional · recommended daily'}];
  } else {
    const exTypes=T[APP.lang].ob_exercise_types||[];
    const exType=exTypes.find(e=>e.id===p.exercise_type)||{title:'Workout',kcal:400};
    const dur=p.exercise_duration||60;
    const burn=p.exercise_burn||Math.round(exType.kcal*dur/60);
    const walkName=APP.lang==='es'?'Caminata (~30 min)':'Walk (~30 min)';
    const walkHint=APP.lang==='es'?'opcional · recomendado diario':'optional · recommended daily';
    const trainName=`${exType.title} (~${dur} min)`;
    actDef=cf
      ?[{id:'walk',name:walkName,burn:150,hint:walkHint},{id:'cf',name:trainName,burn}]
      :[{id:'walk',name:walkName,burn:150,hint:walkHint}];
  }

  h+=`<div class="sec">${t('physical_activity')}</div>`;
  if(actDef.length>0){
    h+=`<div style="display:flex;justify-content:flex-end;padding:0 12px 2px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${APP.lang==='es'?'kcal quemadas':'kcal burned'}</div>`;
  }
  actDef.forEach(a=>{
    const dn=acNow[a.id]?'done':'';
    const customBurn = APP.actBurn && APP.actBurn[d] && APP.actBurn[d][a.id];
    const showEdit = APP.actEditMode && APP.actEditMode[d+a.id];

    if(a.id==='walk') {
      // Walk: duration picker → auto-calculates kcal at ~4 kcal/min
      const walkMins = (APP.walkMins && APP.walkMins[d]) || (p.isCharly ? 75 : 30);
      const walkKcal = customBurn || Math.round(walkMins * 4);
      const showWalkEdit = showEdit;
      const walkDurations = [15,20,30,45,60,75,90];
      h+=`<div class="arow ${dn}" style="flex-wrap:wrap;gap:6px">
        <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;min-width:120px" onclick="tA('${d}','walk')">
          <div class="chkr ${dn}"></div>
          <div>
            <span class="aname">${APP.lang==='es'?'Caminata':'Walk'}</span>
            ${a.hint?`<div style="font-size:9px;color:var(--text3);margin-top:1px">${a.hint}</div>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--text3)">${APP.lang==='es'?'min:':'min:'}</span>
          ${walkDurations.map(m=>`<button onclick="setWalkMins('${d}',${m})" style="padding:3px 7px;border-radius:12px;border:1.5px solid ${walkMins===m?'var(--green)':'var(--border2)'};background:${walkMins===m?'var(--green)':'transparent'};color:${walkMins===m?'#fff':'var(--text3)'};font-size:11px;font-weight:600;cursor:pointer">${m}</button>`).join('')}
          <span class="akcal" style="margin-left:4px">+${walkKcal} kcal</span>
        </div>
      </div>`;
    } else {
      // Workout: shows calculated kcal with manual override ✏️
      const displayBurn = customBurn || a.burn;
      const editBtn=`<button onclick="openEditBurn('${d}','${a.id}')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer">✏️</button>`;
      const editInput=`<input id="burn_${d}_${a.id}" type="number" inputmode="numeric" value="${displayBurn}" style="width:60px;padding:4px 6px;border-radius:6px;border:1px solid var(--green);background:var(--bg2);color:var(--text);font-size:12px;text-align:center" oninput="setCustomBurn('${d}','${a.id}',this.value)">
        <button onclick="closeEditBurn('${d}','${a.id}')" style="font-size:11px;padding:3px 8px;border-radius:5px;border:none;background:var(--green);color:#fff;cursor:pointer">✓</button>`;
      h+=`<div class="arow ${dn}" style="flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer" onclick="tA('${d}','${a.id}')">
          <div class="chkr ${dn}"></div>
          <span class="aname">${a.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${showEdit ? editInput : `<span class="akcal">+${displayBurn} kcal${customBurn?'*':''}</span>${editBtn}`}
        </div>
      </div>`;
    }
  });

  // ── MEAL SECTIONS — structured by eating pattern ──
  const eating = p.eating || 'omad';
  const isEs2 = APP.lang==='es';
  const BREAKFASTS_DB = FDB.filter(f=>f.cat==='Breakfast');

  // Helper to render a full restaurant/home-meal section
  function renderMealSection(sectionTitle, sectionIcon, sectionId, mealsData) {
    const selSt2 = APP.meal[d]||{};
    // curM2 is per-restaurant now — checked inside the loop
    let s = `<div class="sec">${sectionIcon} ${sectionTitle}</div>`;
    if (p.isCharly && sectionId !== 'breakfast') {
      s+=`<div class="skey">${t('snack_a_key')}${t('snack_key_suffix')}</div>`;
    }
    mealsData.forEach(r=>{
      const selM2=selSt2[r.id],isOpen2=APP.rest[d]&&APP.rest[d][r.id],hasSel2=selM2!==undefined;
      s+=`<div class="rest-card"><div class="rest-hdr" onclick="tRest('${d}','${r.id}')">
        <span class="ricon">${r.icon||'🍽️'}</span><span class="rname">${r.name}</span>
        <span class="rsrc">${r.src||''}</span>${hasSel2?`<span class="rok">✓</span>`:''}
        <span class="rarr${isOpen2?' open':''}">▼</span>
      </div><div class="rbody${isOpen2?' open':''}">`;
      r.meals.forEach((m2,mi)=>{
        const isSel2=selM2===mi;
        const tK2=m2.items.reduce((acc,x)=>acc+x.kcal,0)+(m2.snack?getSnackItems(m2.snack).reduce((acc,x)=>acc+x.kcal,0):0);
        const tP2=m2.items.reduce((acc,x)=>acc+x.prot,0)+(m2.snack?getSnackItems(m2.snack).reduce((acc,x)=>acc+x.prot,0):0);
        const tC2=m2.items.reduce((acc,x)=>acc+(x.carb||0),0)+(m2.snack?getSnackItems(m2.snack).reduce((acc,x)=>acc+(x.carb||0),0):0);
        s+=`<div class="mopt"><div class="mhdr" onclick="selM('${d}','${r.id}',${mi})">
          <div class="mradio${isSel2?' checked':''}"></div>
          <div class="minfo">
            <div class="mname">${m2.name}</div>
            ${m2.note?`<div class="mnote">ℹ ${m2.note}</div>`:''}
            <div class="mmacs">${tK2}kcal · ${tP2}g P · ${tC2}g C${m2.atun?` · ${m2.atun}🥫`:''}</div>
          </div>
        </div>`;
        if(isSel2&&selM2===mi){
          const curM2=getMeal(d,r.id);
          s+=`<div class="iwrap open">`;
          s+=`<div style="display:flex;align-items:center;gap:4px;padding:4px 0 2px;border-bottom:0.5px solid var(--border)">
            <div style="width:18px;flex-shrink:0"></div><div style="width:20px;flex-shrink:0"></div>
            <div style="flex:1;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${isEs2?'Alimento':'Food item'}</div>
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;text-align:right;white-space:nowrap;margin-right:4px">${isEs2?'Cant · Gramaje':'Qty · Serving'}</div>
          </div>`;
          s+=`<div class="glbl">${r.name}${r.src?' — '+r.src:''}</div>`;
          m2.items.forEach((x,j)=>{s+=row(d,{...x,id:'m'+r.id+'_'+j},'m');});
          if(m2.snack){s+=`<div class="glbl">Snack ${m2.snack}</div>`;getSnackItems(m2.snack).forEach(x=>{s+=row(d,x,'m');});}
          if(p.isCharly&&(m2.atun||0)>0){s+=`<div class="glbl">${isEs2?'Atún':'Tuna'}</div>`;for(let j=0;j<m2.atun;j++)s+=row(d,{...getATUN(APP.lang),id:'at'+j},'m');}
          s+=`</div>`;
        }
        s+=`</div>`;
      });
      s+=`</div></div>`;
    });
    return s;
  }

  // Breakfast options as items with stable IDs — uses row() for full checkbox/qty/mult support
  function renderBreakfastSection() {
    const bfKey = 'breakfast_open_'+d;
    const isOpen3 = APP.rest[d]&&APP.rest[d][bfKey];
    let s = `<div class="sec">🌅 ${isEs2?'Desayuno':'Breakfast'}</div>`;
    s += `<div class="rest-card"><div class="rest-hdr" onclick="tRest('${d}','${bfKey}')">
      <span class="ricon">🌅</span><span class="rname">${isEs2?'Opciones de desayuno':'Breakfast options'}</span>
      <span class="rsrc">${isEs2?'Casero':'Home'}</span>
      <span class="rarr${isOpen3?' open':''}">▼</span>
    </div><div class="rbody${isOpen3?' open':''}">`;
    s += `<div style="display:flex;align-items:center;gap:4px;padding:4px 0 2px;border-bottom:0.5px solid var(--border)">
      <div style="width:18px;flex-shrink:0"></div><div style="width:20px;flex-shrink:0"></div>
      <div style="flex:1;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">${isEs2?'Alimento':'Food item'}</div>
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;text-align:right;white-space:nowrap;margin-right:4px">${isEs2?'Cant · Gramaje':'Qty · Serving'}</div>
    </div>`;
    BREAKFASTS_DB.forEach((f,i)=>{
      // Stable ID: bf0, bf1... so checkbox state persists across renders
      s += row(d, {id:'bf'+i, name:f.n, kcal:f.k, prot:f.p, carb:f.c||0}, 'm');
    });
    s+=`</div></div>`;
    return s;
  }

  // Render snacks & extras section (always shown)
  function renderSnacksSection() {
    let s = `<div class="sec">🥗 ${isEs2?'Snacks y extras':'Snacks & extras'}</div>`;
    s += `<div class="exbox" style="margin:0 12px 7px"><div class="exhdr">${t('extra_protein_snacks')}</div>`;
    getExtraSnacks().forEach(x=>{s+=row(d,x,'e');});
    s += `</div><div class="exbox" style="margin:0 12px 7px"><div class="exhdr">${t('optional_extras')}</div>`;
    exItems(d).forEach(x=>{s+=row(d,x,'e');});
    s += `</div>`;
    const cl3=APP.cust[d]||[];
    const customNoBreakfast = cl3.filter(x=>!BREAKFASTS_DB.find(f=>f.n===x.name));
    if(customNoBreakfast.length){
      s+=`<div style="margin:0 12px 7px"><div class="glbl">${t('searched_foods')}</div>`;
      customNoBreakfast.forEach(x=>{s+=row(d,x,'c');});
      s+=`</div>`;
    }
    return s;
  }

  // Build sections based on eating pattern
  // rests = main meal options (home/delivery/both) — breakfast is NEVER in rests
  const mainRests = rests; // already excludes breakfast
  const dinnerRests = rests.map(r=>({...r, id:r.id+'_dinner'})); // unique IDs for dinner

  if (eating === '3meals') {
    // Breakfast: separate simple section (home options from FDB)
    h += renderBreakfastSection();
    h += renderMealSection(isEs2?'Almuerzo — Comida principal':'Lunch — Main meal', '🥩', 'lunch', mainRests);
    h += renderMealSection(isEs2?'Cena — Comida principal':'Dinner — Main meal', '🌙', 'dinner', dinnerRests);
    h += renderSnacksSection();
  } else if (eating === '2meals') {
    h += renderMealSection(isEs2?'Primera comida — Almuerzo':'First meal — Lunch', '☀️', 'lunch', mainRests);
    h += renderMealSection(isEs2?'Segunda comida — Cena':'Second meal — Dinner', '🌙', 'dinner', dinnerRests);
    h += renderSnacksSection();
  } else if (eating === 'omad' || eating === 'ext_omad') {
    h += renderMealSection(isEs2?'Comida principal':'Main meal', '🍽️', 'main', mainRests);
    // Optional light breakfast for OMAD — uses row() with stable IDs
    const bfOpen = APP.rest[d]&&APP.rest[d]['breakfast_open_'+d];
    h += `<div class="sec">🌅 ${isEs2?'Opcional — Desayuno ligero':'Optional — Light breakfast'}</div>`;

  }

function render() {

  if (!root) return;
  if (APP.screen === 'onboard') {
    root.innerHTML = renderOnboard();
  } else if (APP.screen === 'settings') {
    root.innerHTML = renderSettings();

  } else {
    root.innerHTML = renderTracker() + renderSearch();

    if (si) si.addEventListener('input', function(){updateSR();});

}

function updateSR(){
  const el=document.getElementById('sr');if(!el)return;
  const q=document.getElementById('si')?.value||'';
  if(q.length<2){el.innerHTML='';return;}
  const {list,type}=srch(q);
  const isEs=APP.lang==='es';

  // Also search custom foods
  const ql=q.toLowerCase().trim();
  const customMatches=(APP.customFoods||[]).filter(f=>f.n.toLowerCase().includes(ql));

  if(!list.length && !customMatches.length){
    el.innerHTML=`<div class="nores">${t('no_results')}</div>
    <div style="margin-top:10px;padding:12px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--radius)">
      <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px">+ ${isEs?'Agregar alimento manualmente':'Add food manually'}</div>
      ${manualFormHtml(q,isEs)}
    </div>`;
    return;
  }

  const hmLabel=t('home_meals_tag')||'Home cooked meals';
  const hdr=type==='p'?`<div style="font-size:10px;color:var(--green);margin-bottom:5px;font-weight:700">🟢 ${t('high_protein')}</div>`
    :type==='l'?`<div style="font-size:10px;color:var(--blue);margin-bottom:5px;font-weight:700">🔵 ${t('low_cal')}</div>`
    :type==='h'?`<div style="font-size:10px;color:#9B5000;margin-bottom:5px;font-weight:700">🟠 ${t('high_carb')}</div>`
    :type==='hm'?`<div style="font-size:10px;color:#8B5CF6;margin-bottom:5px;font-weight:700">🏠 ${hmLabel} — ${list.length} meals</div>`
    :`<div style="font-size:10px;color:var(--text3);margin-bottom:5px">${list.length} ${list.length>1?t('results_pl'):t('results')} — ${t('add')}</div>`;

  // Render custom food results first (if any)
  let customHtml='';
  if(customMatches.length){
    customHtml=`<div style="font-size:10px;color:var(--green);margin-bottom:4px;font-weight:700">🏷 ${isEs?'Mis alimentos':'My foods'}</div>`;
    customMatches.forEach((f,i)=>{
      customHtml+=`<div class="sri" style="position:relative" onclick="addCustomFoodToDay(${APP.customFoods.indexOf(f)})">
        <div style="flex:1">
          <div class="sriname">${escapeHTML(f.n)} <span style="font-size:9px;padding:1px 5px;border-radius:4px;background:var(--bg3);color:var(--green);border:.5px solid var(--green)">custom</span></div>
        </div>
        <div class="srimac">${f.k}kcal<br>${f.p}g P · ${f.c}g C${f.f?` · ${f.f}g F`:''}</div>
        <div class="sriadd">+</div>
        <button onclick="deleteCustomFood(event,${APP.customFoods.indexOf(f)})" style="position:absolute;top:4px;right:30px;font-size:10px;background:transparent;border:none;color:var(--text3);cursor:pointer">✕</button>
      </div>`;
    });
  }

  el.innerHTML=customHtml+hdr+list.map((f,i)=>{
    const tags=[
      f.hi?`<span class="tp2">${t('high_protein')}</span>`:'',
      f.lc?`<span class="tl2">${t('low_cal')}</span>`:'',
      f.hc?`<span class="th2">${t('high_carb')}</span>`:'',
      f.hm?`<span style="font-size:9px;padding:1px 5px;border-radius:4px;background:#2d1f4e;color:#a78bfa;flex-shrink:0">🏠 ${hmLabel}</span>`:'',
    ].filter(Boolean).join('');
    return`<div class="sri" onclick="addFood('${f.n.replace(/'/g,"\\'")}',${f.k},${f.p},${f.c||0},${f.f||0})">
      <div style="flex:1"><div class="sriname">${escapeHTML(f.n)}${tags}</div><div class="sricat">${f.cat}</div></div>
      <div class="srimac">${f.k}kcal<br>${f.p}g P · ${f.c}g C${f.f?` · ${f.f}g F`:''}</div>
      <div class="sriadd">+</div>
    </div>`;
  }).join('')
  // Always show "add manually" toggle at bottom
  + `<div style="margin-top:8px;border-top:.5px solid var(--border);padding-top:8px">
    <button onclick="toggleManualForm()" style="font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;padding:2px 0">
      + ${isEs?'No encontrás lo que buscás? Agregar versión propia':'Not finding exactly what you need? Add your own version'}
    </button>
    <div id="manual-form-wrapper" style="display:none;margin-top:8px">
      ${manualFormHtml(q,isEs)}
    </div>
  </div>`;
}

function saveCustomFood(){
  const name=(document.getElementById('cf-name')?.value||'').trim();
  const kcal=parseInt(document.getElementById('cf-kcal')?.value||0);
  const prot=parseInt(document.getElementById('cf-prot')?.value||0);
  const carb=parseInt(document.getElementById('cf-carb')?.value||0);
  if(!name||!kcal){
    alert(APP.lang==='es'?'Ingresá nombre y kcal como mínimo.':'Please enter at least a name and kcal.');
    return;
  }
  if(!APP.customFoods)APP.customFoods=[];
  const fat2=parseInt(document.getElementById('cf-fat')?.value||0);
  const newFood={id:'cf_'+Date.now(),n:name,k:kcal,p:prot,c:carb,f:fat2,custom:true,cat:'Custom'};
  APP.customFoods.push(newFood);
  // Also add to today's custom items
  const d=APP.day||currentDayId();
  if(!APP.cust[d])APP.cust[d]=[];
  APP.cust[d].push({id:'cx_'+Date.now(),name,kcal,prot,carb,fat:fat2});
  save();
  // Clear search and re-render
  const si=document.getElementById('si');
  if(si)si.value='';
  const sr=document.getElementById('sr');
  if(sr)sr.innerHTML=`<div style="padding:8px;font-size:12px;color:var(--green)">✓ "${name}" ${APP.lang==='es'?'guardado y agregado a hoy':'saved and added to today'}</div>`;
  setTimeout(()=>render(),1200);
}

function addCustomFoodToDay(idx){
  const f=APP.customFoods[idx];if(!f)return;
  const d=APP.day||currentDayId();
  if(!APP.cust[d])APP.cust[d]=[];
  APP.cust[d].push({id:'cx_'+Date.now(),name:f.n,kcal:f.k,prot:f.p,carb:f.c});
  save();render();
}

function deleteCustomFood(e,idx){
  e.stopPropagation();
  if(!confirm(APP.lang==='es'?'¿Eliminar este alimento personalizado?':'Delete this custom food?'))return;
  APP.customFoods.splice(idx,1);
  save();updateSR();
}

function addFood(n,k,p,c,f){
  const d=APP.day;if(!d)return;
  if(!APP.cust[d])APP.cust[d]=[];
  APP.cust[d].push({id:'cx'+Date.now(),name:n,kcal:k,prot:p,carb:c||0,fat:f||0});
  const si=document.getElementById('si');if(si)si.value='';
  document.getElementById('sr').innerHTML='';
  save();render();
}

function setSearch(v){const si=document.getElementById('si');if(si){si.value=v;si.focus();}updateSR();}

function deleteProfile(profileId){
  if(profileId==='charly')return; // never delete Charly
  const prof=APP.profiles.find(p=>p.id===profileId);
  const name=prof?prof.name:'this profile';
  const msg=APP.lang==='es'
    ?`¿Eliminar el perfil de ${name}? Esto no se puede deshacer.`
    :`Delete ${name}'s profile? This cannot be undone.`;
  if(!confirm(msg))return;
  APP.profiles=APP.profiles.filter(p=>p.id!==profileId);
  if(APP.allTrackingData)delete APP.allTrackingData[profileId];
  // If deleted profile was active, switch to Charly
  if(APP.activeProfileId===profileId){
    APP.activeProfileId='charly';
    APP.profile=APP.profiles.find(p=>p.id==='charly')||{...CHARLY_PROFILE};
    loadProfileTracking('charly');
  }
  save();render();
}
// Edit profile in place
function startEdit(){
  APP.settings_edit_mode=true;
  APP.settings_edit_data={};
  render();
}
function cancelEdit(){APP.settings_edit_mode=false;APP.settings_edit_data={};render();}
function seSet(key,val){if(!APP.settings_edit_data)APP.settings_edit_data={};APP.settings_edit_data[key]=val;render();}
function seSetInput(key,val){if(!APP.settings_edit_data)APP.settings_edit_data={};APP.settings_edit_data[key]=val;}
function seToggleDay(i){
  if(!APP.settings_edit_data)APP.settings_edit_data={};
  const p=getProfile();
  const cur=APP.settings_edit_data.exercise_days||(p.exercise_days?[...p.exercise_days]:(p.cf_days?[...p.cf_days]:[]));
  const idx=cur.indexOf(i);
  if(idx>=0)cur.splice(idx,1);else cur.push(i);
  APP.settings_edit_data.exercise_days=[...cur];
  render();
}
function saveEdit(){
  const ed=APP.settings_edit_data||{};
  const p=APP.profile;
  if(!p)return;
  if(ed.weight!==undefined&&ed.weight!==''){p.weight=parseFloat(ed.weight);p.weight_updated_at=Date.now();}
  if(ed.waist!==undefined&&ed.waist!==''){
    if(!p.start_waist)p.start_waist=p.waist; // preserve starting waist
    p.waist=parseFloat(ed.waist);
    p.weight_updated_at=Date.now(); // waist update also resets reminder
  }
  if(ed.age!==undefined&&ed.age!=='')p.age=parseInt(ed.age);
  if(ed.height!==undefined&&ed.height!=='')p.height=parseInt(ed.height);
  if(ed.neck!==undefined&&ed.neck!=='')p.neck=parseFloat(ed.neck);
  if(ed.goal)p.goal=ed.goal;
  if(ed.activity)p.activity=ed.activity;
  if(ed.eating)p.eating=ed.eating;
  if(ed.mealstyle)p.mealstyle=ed.mealstyle;
  if(ed.city!==undefined)p.city=ed.city;
  if(ed.exercise_type)p.exercise_type=ed.exercise_type;
  if(ed.exercise_days){p.exercise_days=[...ed.exercise_days];p.cf_days=[...ed.exercise_days];}
  if(ed.target_weight!==undefined&&ed.target_weight!=='')p.target_weight=parseFloat(ed.target_weight);
  if(ed.target_fat!==undefined&&ed.target_fat!=='')p.target_fat=parseFloat(ed.target_fat);
  // Store start weight if not already set
  if(!p.start_weight)p.start_weight=p.weight;
  // Recalculate macros for everyone (unified Mifflin formula)
  const m=calcMacros(p);
  p.bmr=m.bmr; p.neat=m.neat; p.tdee=m.tdee;
  p.tdee_cf=m.tdee_active; p.tdee_rest=m.tdee_rest;
  p.target_cf=m.target_active; p.target_rest=m.target_rest; p.target_kcal=m.target_kcal;
  p.prot_min=m.prot_min;
  p.carb_cf=m.carb_cf; p.carb_rest=m.carb_rest; p.carb_max=m.carb_max;
  p.deficit_min_cf=m.deficit_min_cf; p.deficit_max_cf=m.deficit_max_cf;
  p.deficit_min_rest=m.deficit_min_rest; p.deficit_max_rest=m.deficit_max_rest;
  p.deficit_min=m.deficit_min; p.deficit_max=m.deficit_max;
  if(ed.exercise_type||ed.exercise_duration){
    const tl2=T[APP.lang];
    const exType=tl2.ob_exercise_types.find(e=>e.id===p.exercise_type)||{kcal:400};
    const dur2=p.exercise_duration||60;
    p.exercise_burn=Math.round(exType.kcal*dur2/60);
  }
  // Update in profiles list
  const idx=APP.profiles.findIndex(x=>x.id===p.id);
  if(idx>=0)APP.profiles[idx]={...p};
  // Clear macro cache so next render recalculates
  delete p._macroCache;
  APP.settings_edit_mode=false;APP.settings_edit_data={};
  save();render();
}

function seSetCityInput(val){
  seSetInput('city',val);
  APP._seCityStatus='idle';
  clearTimeout(window._seCityTimer);
  if(!val||val.trim().length<2){render();return;}
  window._seCityTimer=setTimeout(async()=>{
    APP._seCityStatus='checking';render();
    try{
      const resp=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=1`,{headers:{'Accept-Language':'en','User-Agent':'MagicTracker/3.9'}});
      const data=await resp.json();
      if(data&&data.length>0){APP._seCityStatus='valid';APP._seCityResolved=data[0].display_name.split(',').slice(0,2).join(',').trim();}
      else{APP._seCityStatus='invalid';APP._seCityResolved='';}
    }catch(e){APP._seCityStatus='valid';APP._seCityResolved=val;}
    render();
  },800);
}
function obSetCityQuick(c){
  APP.ob_data.city=c;
  APP._cityStatus='valid';
  APP._cityResolved=c;
  save();render();
}
function obSetCityInput(val){
  APP.ob_data.city=val;
  APP._cityStatus='idle';
  APP._cityResolved='';
  save();
  // Re-render button state immediately
  const btn=document.querySelector('.ob-btn:not(.ob-btn-secondary)');
  if(btn)btn.disabled=true;
  clearTimeout(window._cityTimer);
  if(!val||val.trim().length<2){render();return;}
  window._cityTimer=setTimeout(()=>validateCity(val),800);
}
async function validateCity(q){
  APP._cityStatus='checking';
  render();
  try {
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=0`;
    const resp=await fetch(url,{headers:{'Accept-Language':'en','User-Agent':'MagicTracker/3.5'}});
    const data=await resp.json();
    if(data&&data.length>0){
      APP._cityStatus='valid';
      APP._cityResolved=data[0].display_name.split(',').slice(0,2).join(',').trim();
    } else {
      APP._cityStatus='invalid';
      APP._cityResolved='';
    }
  } catch(e){
    // Network error — allow anyway (don't block offline users)
    APP._cityStatus='valid';
    APP._cityResolved=q;
  }
  render();
}
function obSetCity(c){obSetCityQuick(c);}
function obToggleDiet(id){
  const d=APP.ob_data.diet;
  if(id==='none'){APP.ob_data.diet=['none'];render();return;}
  const idx=d.indexOf(id);
  if(idx>=0)d.splice(idx,1);else{d.push(id);const ni=d.indexOf('none');if(ni>=0)d.splice(ni,1);}
  render();
}
function obNext(){APP.ob_step++;save();render();}
function obBack(){if(APP.ob_step>0){APP.ob_step--;save();render();}}
function obFinish(){
  try {
  const od=APP.ob_data;
  const m=calcMacros({
    sex:od.sex, age:parseInt(od.age)||30, height:parseInt(od.height)||170,
    weight:parseFloat(od.weight)||70, goal:od.goal||'cut', activity:od.activity||'moderate',
    exercise_days:od.exercise_days||[], exercise_burn:0, exercise_duration:parseInt(od.exercise_duration||60)
  });
  const tl=T[od.lang||'en'];
  const exType=(tl.ob_exercise_types||[]).find(e=>e.id===od.exercise_type)||{kcal:400};

function init() {
  load();
  if (!APP.langSetByUser) APP.lang = 'en';
  if (!APP.allTrackingData) APP.allTrackingData = {};

  // Always ensure Charly is in the profiles list
  ensureCharlyProfile();

  // FIRST TIME: no activeProfileId and no prior data → show onboarding
  const hadPriorData = localStorage.getItem('tracker_s');
  if (!APP.activeProfileId && !hadPriorData) {
    // Brand new device — show onboarding
    APP.screen = 'onboard';
    APP.ob_step = 0;
    APP.ob_data = { lang:'en', sex:null, age:'', height:'', weight:'', waist:'', goal:null, activity:null, eating:null, mealstyle:null, diet:[], name:'', exercise_type:null, exercise_days:[], exercise_duration:'60' };
    render();
    return;
  }

  // Migrate old data: had prior data but no activeProfileId → default to Charly
  if (!APP.activeProfileId) {
    APP.activeProfileId = 'charly';
  }

  // Ensure activeProfileId exists in profiles list
  if (!APP.profiles.find(p => p.id === APP.activeProfileId)) {
    APP.activeProfileId = 'charly';
  }

  // Load active profile
  const prof = APP.profiles.find(p => p.id === APP.activeProfileId);
  APP.profile = prof.isCharly ? APP.profiles.find(x=>x.id==='charly')||{...CHARLY_PROFILE} : prof;
  loadProfileTracking(APP.activeProfileId);
  APP.screen = 'tracker';
  save();
  render();

  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
  // Start Firebase and schedule any saved reminders
  try { initFirebase(); } catch(e) {}
  scheduleLocalReminders();

  // Auto re-register in Firestore on every app open (keeps token fresh)
  const existingToken = getNS()?.fcmToken;
  if (existingToken && Notification.permission === 'granted') {
    setTimeout(() => registerDeviceInFirestore(existingToken), 3000);
  }

  // On Android/iOS PWA, reschedule when app comes back to foreground
  // (timers are cleared when app goes to background on some devices)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      scheduleLocalReminders();
    }
  });
}

async function _writeToFirestore(token) {
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Europe/London';
  const uid = token.substring(0, 28).replace(/[^a-zA-Z0-9]/g, '_');

  // Force sync APP.profile.notifSettings to APP.profiles[] before writing
  _saveNS();

  // Build a clean copy of profiles with notifSettings included
  const profiles = (APP.profiles || []).map(p => {
    const clean = {...p};
    // For the active profile, make sure notifSettings is from APP.profile (most current)
    if (p.id === APP.activeProfileId && APP.profile?.notifSettings) {
      clean.notifSettings = APP.profile.notifSettings;
    }
    return clean;
  });

  const db = firebase.firestore();
  await db.collection('users').doc(uid).set({
    fcmToken: token,
    activeProfileId: APP.activeProfileId || 'charly',
    profiles,
    lang: APP.lang || 'en',
    timezone,
    updatedAt: new Date().toISOString(),
  }, {merge: true});
  return uid;
}

async function registerDeviceInFirestore(token) {
  try {

    console.log('✓ Registered in Firestore uid:', uid);
    return {ok: true, uid};
  } catch(e) {
    console.error('✗ Firestore write error:', e.code, e.message);
    return {ok: false, error: e.message};
  }
}

function scheduleLocalReminders() {
  // Cancel existing poll interval and timers
  if (window._notifInterval) clearInterval(window._notifInterval);
  if (window._notifTimers) window._notifTimers.forEach(t => clearTimeout(t));
  window._notifTimers = [];
  if (!window._notifFired) window._notifFired = {};

  const ns = getNS();
  if (!ns || Notification.permission !== 'granted') return;
  const hasActive = ns.enabled || Object.keys(ns).some(k => k !== 'fcmToken' && k !== 'enabled' && ns[k] === true);
  if (!hasActive) return;

  const isEs = APP.lang === 'es';
  const p = APP.profile;
  const cfDays = p?.cf_days || [0,2,4];

  async function showNotif(title, body, tag) {
    try {
      const reg = await Promise.race([
        navigator.serviceWorker.ready,
        new Promise((_,r) => setTimeout(() => r(new Error('to')), 2000))
      ]);
      reg.showNotification(title, {body, tag, renotify:true, icon:'./icons/icon-192.png', badge:'./icons/icon-192.png'});
    } catch(e) {
      try { new Notification(title, {body, icon:'./icons/icon-192.png'}); } catch(e2){}
    }
  }

  const PRESETS = {
    meal:    {title: isEs?'🍽️ Comida principal':'🍽️ Main meal',                     body: isEs?'Hora de tu comida principal':'Time for your main meal',       days: null},
    snack:   {title: isEs?'🥗 Snack':'🥗 Snack time',                               body: isEs?'Recordá registrar tu snack':"Don't forget to log your snack", days: null},
    supps:   {title: isEs?'💊 Creatina + electrolitos':'💊 Creatine + electrolytes', body: isEs?'Suplementos de la mañana':'Morning supplements',             days: null},
    supps2:  {title: isEs?'💊 Suplementos tarde':'💊 Afternoon supplements',         body: isEs?'Suplementos de la tarde':'Afternoon supplements',             days: null},
    workout: {title: isEs?'🏋️ Hora de entrenar':'🏋️ Workout time',                  body: isEs?'Hoy es día de entrenamiento':'Today is a training day',        days: cfDays},
    weigh:   {title: isEs?'⚖️ Pesaje semanal':'⚖️ Weekly weigh-in',                  body: isEs?'Actualizá tu peso y cintura en Settings':'Update weight & waist', days: 'weekly_mon'},
    water:   {title: isEs?'💧 Tomar agua':'💧 Drink water',                         body: isEs?'Recordatorio de hidratación':'Hydration reminder',              days: null},
  };

  // Poll every 30 seconds using LOCAL time — much more reliable on Android than long setTimeout
  function checkAndFire() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const currentTime = hh + ':' + mm;
    const jsDay = now.getDay(); // 0=Sun..6=Sat JS convention
    const toApp = d => d === 0 ? 6 : d - 1; // convert to 0=Mon..6=Sun
    const appDay = toApp(jsDay);
    const dateKey = now.getFullYear() + '-' + now.getMonth() + '-' + now.getDate();

    // Re-read ns each poll so settings changes take effect immediately
    const currentNS = getNS();

    Object.entries(PRESETS).forEach(([k, v]) => {
      if (!currentNS[k] || !currentNS[k+'Time']) return;
      if (currentNS[k+'Time'] !== currentTime) return;
      if (v.days === 'weekly_mon' && jsDay !== 1) return;
      if (Array.isArray(v.days) && !v.days.includes(appDay)) return;
      const fireKey = k + '-' + currentTime + '-' + dateKey;
      if (window._notifFired[fireKey]) return;
      window._notifFired[fireKey] = true;
      showNotif(v.title, v.body, k);
    });

    (currentNS.custom||[]).forEach((r,i) => {
      if (!r.active || r.time !== currentTime) return;
      const fireKey = 'cx' + i + '-' + currentTime + '-' + dateKey;
      if (window._notifFired[fireKey]) return;
      window._notifFired[fireKey] = true;
      showNotif('🔔 MagicTracker', r.label, 'custom_'+i);
    });

    // Clean up yesterday's fired keys
    Object.keys(window._notifFired).forEach(k => {
      if (!k.endsWith(dateKey)) delete window._notifFired[k];
    });
  }

  checkAndFire();
  window._notifInterval = setInterval(checkAndFire, 30000);
}

          style="font-size:11px;background:var(--bg2);border:.5px solid var(--border2);border-radius:6px;padding:3px 6px;color:var(--text);opacity:${active?1:0.4}">
        <div onclick="toggleNotif('${r.key}')" style="width:38px;height:22px;border-radius:11px;background:${active?'var(--green)':'var(--border2)'};cursor:pointer;position:relative;flex-shrink:0;transition:background .2s">
          <div style="position:absolute;top:3px;${active?'right:3px':'left:3px'};width:16px;height:16px;border-radius:50%;background:#fff;transition:all .2s"></div>
        </div>
      </div>`;
    });

    // Custom reminders
    html += `<div style="padding:8px 12px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;border-top:.5px solid var(--border)">${isEs?'Mis recordatorios':'My reminders'}</div>`;
    customReminders.forEach((r,i) => {
      html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:.5px solid var(--border)">
        <span style="font-size:15px;flex-shrink:0">🔔</span>
        <span style="flex:1;font-size:13px;color:var(--text)">${escapeHTML(r.label)}</span>
        <input type="time" value="${r.time||'09:00'}" onchange="setCustomNotifTime(${i},this.value)"
          style="font-size:11px;background:var(--bg2);border:.5px solid var(--border2);border-radius:6px;padding:3px 6px;color:var(--text)">
        <div onclick="toggleCustomNotif(${i})" style="width:38px;height:22px;border-radius:11px;background:${r.active?'var(--green)':'var(--border2)'};cursor:pointer;position:relative;flex-shrink:0">
          <div style="position:absolute;top:3px;${r.active?'right:3px':'left:3px'};width:16px;height:16px;border-radius:50%;background:#fff"></div>
        </div>
        <button onclick="deleteCustomNotif(${i})" style="font-size:14px;background:transparent;border:none;color:var(--text3);cursor:pointer;padding:0 2px">✕</button>
      </div>`;
    });

    // Add custom reminder form
    const showForm = APP._showNotifForm;
    html += `<div style="padding:8px 12px;border-top:.5px solid var(--border)">
      ${showForm ? `
      <div style="display:flex;flex-direction:column;gap:7px">
        <input id="notif-custom-label" class="sinp" type="text" placeholder="${isEs?'Ej: Tomar omega 3':'E.g. Take omega 3'}" style="margin:0">
        <div style="display:flex;gap:8px;align-items:center">
          <input id="notif-custom-time" type="time" value="09:00"
            style="font-size:13px;background:var(--bg2);border:.5px solid var(--border2);border-radius:6px;padding:6px 8px;color:var(--text);flex:1">
          <button onclick="saveCustomNotif()" style="padding:7px 14px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;font-size:13px;cursor:pointer;font-weight:600">
            ${isEs?'Guardar':'Save'}
          </button>
          <button onclick="APP._showNotifForm=false;render()" style="padding:7px 10px;border-radius:var(--radius);border:.5px solid var(--border2);background:transparent;color:var(--text3);font-size:13px;cursor:pointer">
            ✕
          </button>
        </div>
      </div>` : `
      <button onclick="APP._showNotifForm=true;render()" style="font-size:12px;color:var(--green);background:transparent;border:.5px solid var(--green);border-radius:var(--radius);padding:6px 12px;cursor:pointer;width:100%">
        + ${isEs?'Agregar recordatorio personalizado':'Add custom reminder'}
      </button>`}
    </div>

    <div style="padding:6px 12px 10px;border-top:.5px solid var(--border)">
      <button onclick="disableNotifs()" style="font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer">
        ${isEs?'Desactivar todas las notificaciones':'Disable all notifications'}
      </button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

function saveCustomNotif() {
  const label = document.getElementById('notif-custom-label')?.value?.trim();
  const time = document.getElementById('notif-custom-time')?.value || '09:00';
  if (!label) return;
  // notifSettings auto-initialized by getNS()
  if (!getNS().custom) getNS().custom = [];
  getNS().custom.push({label, time, active: true});
  APP._showNotifForm = false;
  _saveNS(); scheduleLocalReminders();
  save(); render();
  syncNotifSettingsToFirestore();
}

function setCustomNotifTime(i, val) {
  if (!getNS()?.custom?.[i]) return;
  getNS().custom[i].time = val;
  _saveNS(); scheduleLocalReminders(); save();
}

function toggleCustomNotif(i) {
  if (!getNS()?.custom?.[i]) return;
  getNS().custom[i].active = !getNS().custom[i].active;
  _saveNS(); scheduleLocalReminders(); save(); render();
}

function deleteCustomNotif(i) {
  if (!getNS()?.custom) return;
  getNS().custom.splice(i, 1);
  scheduleLocalReminders(); save(); render();
}

async function testNotif() {
  const isEs = APP.lang === 'es';
  const title = 'MagicTracker 🎯';
  const body = isEs ? '✓ Las notificaciones funcionan correctamente' : '✓ Notifications are working correctly';

  if (typeof Notification === 'undefined') {
    alert('Notifications API not supported in this browser.');
    return;
  }

  if (Notification.permission === 'denied') {
    alert(isEs
      ? 'Notificaciones bloqueadas. En Chrome: click en el candado 🔒 en la barra de URL → Notificaciones → Permitir.'
      : 'Notifications blocked. In Chrome: click the 🔒 lock in the URL bar → Notifications → Allow.');
    return;
  }

  if (Notification.permission !== 'granted') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      alert(isEs ? 'Permiso denegado.' : 'Permission denied.');
      return;
    }
  }

  let swError = null, basicError = null;

  // Try service worker
  if ('serviceWorker' in navigator) {
    try {
      const reg = await Promise.race([
        navigator.serviceWorker.ready,
        new Promise((_,r) => setTimeout(() => r(new Error('SW timeout')), 2000))
      ]);
      if (reg?.showNotification) {
        await reg.showNotification(title, {body, icon:'./icons/icon-192.png', tag:'test'});
        return; // success
      }
    } catch(e) { swError = e.message; }
  }

  // Fallback: basic Notification
  try {
    new Notification(title, {body, icon:'./icons/icon-192.png'});
    return; // success
  } catch(e) { basicError = e.message; }

  // Both failed — show debug info
  alert(`Could not show notification.\nSW error: ${swError}\nBasic error: ${basicError}\nPermission: ${Notification.permission}`);
}

async function activateAndTest() {
  const isEs = APP.lang === 'es';

  if (Notification.permission === 'denied') {
    alert(isEs
      ? 'Notificaciones bloqueadas. Click en el 🔒 en la barra de URL → Notificaciones → Permitir.'
      : 'Notifications blocked. Click 🔒 in the URL bar → Notifications → Allow.');
    return;
  }
  if (Notification.permission !== 'granted') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
  }

  getNS().enabled = true;
  _saveNS(); save();

  // Get FCM token and register in Firestore
  try {
    if (!fbMsg) initFirebase();
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_,r) => setTimeout(() => r(new Error('SW timeout')), 3000))
    ]);
    const token = await fbMsg.getToken({vapidKey: VAPID_KEY, serviceWorkerRegistration: reg});
    if (token) {
      getNS().fcmToken = token;
      _saveNS(); save();
      await registerDeviceInFirestore(token);
    }
  } catch(e) {
    console.log('FCM registration skipped:', e.message);
  }

  scheduleLocalReminders();

  // Send test notification
  try {
    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification('MagicTracker 🎯', {
      body: isEs ? '✓ Todo funcionando' : '✓ All set — notifications are active',
      icon:'./icons/icon-192.png', tag:'test'
    });
  } catch(e) {
    try { new Notification('MagicTracker 🎯', {body: isEs ? '✓ Activo' : '✓ Active'}); } catch(e2) {}
  }

  render();
}

async function reRegisterDevice() { await activateAndTest(); }

function disableNotifs() {
  // notifSettings auto-initialized by getNS()
  getNS().enabled = false;
  _saveNS();
  syncNotifSettingsToFirestore();
  if (window._notifTimers) window._notifTimers.forEach(t => clearTimeout(t));
  save(); render();
}

function toggleNotif(key) {
  // notifSettings auto-initialized by getNS()
  getNS()[key] = !getNS()[key];
  _saveNS(); scheduleLocalReminders();
  save(); render();
  syncNotifSettingsToFirestore();
}

function setNotifTime(key, val) {
  // notifSettings auto-initialized by getNS()
  getNS()[key+'Time'] = val;
  _saveNS(); scheduleLocalReminders(); save();
  syncNotifSettingsToFirestore();
}

init();
</script>
</body>
</html>
